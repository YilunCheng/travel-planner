function ensureFlightAirports(t){   // pin each flight's airport endpoints — but ONLY the ones NEAR a real destination. The far home/origin hub (e.g. JFK on a Europe trip, or a layover) has no destination near it, so it isn't pinned (and an existing such pin is pruned). Deduped by code.

function rememberView(id,map,engine){   // wire a listener so the trip's current view is always known (for restore-after-rebuild)

function applyMapView(map,engine,id){    // the builders call this: restore the remembered view iff this is a same-trip rebuild (not a fresh open) — returns true iff it did

function guessItemType(text){          // light keyword guess so a typed line gets a sensible icon (only ever upgrades the default 'activity')
  const s=(text||"").toLowerCase();
  if(/\b(airport|lufthavn|aeroport|aéroport|flughafen|aeropuerto)\b|机场|空港|機場/.test(s))return "flight";
  if(/\b(train|railway|amtrak|eurostar|shinkansen|tgv|thalys|railjet|frecciarossa)\b|高铁|火车|動車|动车|新干线|新幹線/.test(s))return "train";   // conservative train words (skip TRAIN_RE's \bice\b/\bave\b — they collide with "ice cream"/"ave")
  if(/\b(hotel|hotell|hôtel|inn|lodge|resort|ryokan|hostel|guesthouse|guest house|b&b)\b|酒店|旅馆|旅館|宾馆|賓館|民宿|旅店/.test(s))return "hotel";
  if(/\bbar\b|\b(pub|tavern|brewery|brewpub|taproom|speakeasy|cocktail|nightclub|beer garden|beer hall)\b|酒吧|酒馆|酒館/.test(s)&&!/\b(sushi|salad|juice|coffee|snack|oyster|noodle|ramen|taco|sandwich|espresso|tapas)\s*bar\b/.test(s))return "bar";   // a drinking bar/pub — but "sushi/coffee/… bar" is food, so it falls through to meal
  if(/\b(restaurant|restaurante|ristorante|café|cafe|coffee|bar|bistro|brasserie|pizzeria|izakaya|trattoria|eatery|grill|steakhouse|dinner|lunch|breakfast|brunch)\b|餐厅|餐廳|饭馆|飯館|咖啡|居酒屋|拉面|拉麵|寿司|壽司|烧烤|燒烤/.test(s))return "meal";
  if(/\b(museum|gallery|galleri)\b|博物馆|博物館|美术馆|美術館|展览馆|展覽館/.test(s))return "museum";
  if(/\b(ski|skiing|slope|piste|snowboard)\b|滑雪|雪场|雪場/.test(s))return "ski";
  if(/\b(hike|hiking|trail|trailhead|trek|trekking)\b|徒步|登山|远足|遠足/.test(s))return "hiking";
  if(/\b(dive|diving|scuba|snorkel|snorkeling|snorkelling|freedive|freediving)\b|潜水|浮潜|深潜|潛水|浮潛/.test(s))return "dive";
  return null;
}
function placeTypeToItem(pt){return ({stay:"hotel",meal:"meal",bar:"bar",activity:"activity",ski:"ski",hiking:"hiking",dive:"dive",museum:"museum"})[pt]||null;}
function applyPlaceTypesToItems(){     // #7: give each typed itinerary line a sensible icon instead of the default 🎟
  linkPlaces(CUR).forEach(p=>{          // 1) propagate claude's classification onto its linked (non-stay) item(s)
    const t=placeTypeToItem(p.type);if(!t||t==="activity")return;
    const day=CUR.days[(p.day||1)-1];if(!day)return;
    (p._itemIds||[]).forEach(id=>{const it=(day.items||[]).find(x=>x.id===id);if(it&&it.type==="activity")it.type=t;});
  });
  (CUR.days||[]).forEach(d=>(d.items||[]).forEach(it=>{   // 2) keyword fallback for any still-default item (airports/hotels/restaurants typed or imported as plain text)
    if(it.type!=="activity")return;

async function recoverUnresolved(unresolved){   // #2: a Nominatim miss gets a second chance via Google Places (far better POI coverage)
  const failed=[];let added=0;
  for(const u of (unresolved||[])){
    const q=(u.query||u.label||"").trim();if(!q)continue;
    let hit=null;try{const res=await gplacesSearch(q);hit=res&&res[0];}catch(e){}
    if(hit){
      const type=(u.type&&u.type!=="other")?u.type:((hit.kind&&hit.kind!=="other")?hit.kind:"activity");
      CUR.places=CUR.places||[];
      CUR.places.push({day:u.day||1,label:u.label||hit.label,type,lat:hit.lat,lng:hit.lng});
      added++;
    }else failed.push(u);
  }
  return {added,failed};
}

async function geocodeTrip(){
  toast("Generating map, please wait…");
  try{
    const r=await fetch("/api/geocode",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:CUR.id})}).then(x=>x.json());
    if(!r||(!r.placed&&!(r.unresolved&&r.unresolved.length))){toast("Generation failed: "+((r&&r.error)||"unknown error"));return;}
    CUR=await api.trip(CUR.id);
    hydrateTrip(CUR);                                      // re-wrap/re-share stays after the server-fresh reload
    backfillItemGeo(CUR);                                  // re-stamp the stable item↔place links onto the server-fresh places
    applyPlaceTypesToItems();                              // #7: propagate inferred types onto the itinerary lines
    const rec=await recoverUnresolved(r.unresolved||[]);   // #2: retry Nominatim misses via Google Places
    backfillItemGeo(CUR);                                  // and onto anything just recovered via search
    _tripView.delete(CUR.id);tripMapCache.delete(CUR.id);SHOWMAP=true;scheduleSave();drawTrip();   // "generate map" SHOULD frame the new places → forget the remembered view so the rebuild re-frames
    let msg=`Mapped ${(CUR.places||[]).length} places`;
    if(rec.added)msg+=` · recovered ${rec.added} via search`;
    toast(msg);
    if(rec.failed.length)showGeocodeMisses(rec.failed);    // #2: surface what still couldn't be located
  }catch(e){toast("Generation failed");}
}

let _rowMenuEl=null,_rowMenuAnchor=null,_rowMenuRect=null,_rowMenuRow=null;
function closeRowMenu(){

function _placeRowMenu(){   // position from the ＋ rect CAPTURED AT OPEN — the live button hides when the row un-hovers (mouse moves onto the menu), and a live rect would then read 0,0 and fling the popover to the top-left corner

function _gapFor(dayId,itemId,where){   // gap index for the insert, computed at click time (robust). null itemId ⇒ 0 (empty-day / day-level); else above=i, below=i+1

// ("9:30AM-12:30PM Snowmobile", "Train Paris-Geneva 2:18-5:31PM") or a SINGLE time
// ("Dinner: Moss 8:30PM", "2:30 PM Ferry"). Display-only & lossless: like flights/legs, it.text

// from the description. Returns {start, end(nullable), plus, raw, idx}; null when no clock time.
function parseItemTime(text){

  if(!m)m=new RegExp("\\s+"+T+"\\s*[-–—~]\\s*"+T+"\\s*\\)?\\s*$","i").exec(t);  // trailing range "… 2:18-5:31PM"

  const q=stayText(d).replace(/\s+/g," ").trim();if(!q){toast("Add a hotel name first");return;}
  searchForStay(dayId,q);

function searchForStay(dayId,seed){          // attach a real location to a day's 🛏 stay via the map search box; the pick upserts the stay place, keeping the hotel name as its label
  LOCSTAY=dayId;LOCITEM=null;SHOWMAP=true;openMapSheet();
  const open=()=>{
    const inp=document.getElementById("mapsearch");
    if(inp){inp.value=seed||"";inp.focus();if(seed)inp.select();}
    if(seed)doMapSearch(seed);   // re-run via Google Places, which often finds a hotel the Nominatim path missed
    else{const host=document.getElementById("mapsearchresults");if(host){host.style.display="block";host.innerHTML=`<div class="msr-empty">Type the hotel name and press Enter, then pick it.</div>`;}}
  };
  if(document.getElementById("mapsearch"))open();else{drawTrip();setTimeout(open,60);}   // make sure the map pane (with its search box) is rendered first
}
function extendStay(dayId){       // copy this night's hotel into the NEXT night (if it's empty), so you don't retype it
  const days=CUR.days||[],di=days.findIndex(d=>d.id===dayId);if(di<0)return;
  const hotel=stayText(days[di]).trim();if(!hotel)return;
  const nx=days[di+1];if(!nx){toast("No next night");return;}
  if(stayText(nx).trim()){toast("The next night already has a hotel");return;}
  pushUndo();nx.stay=days[di].stay;    // SHARE the same stay item across both nights (edit-once; one geo → one pin)
  scheduleSave();softRedraw();
  toast("🛏 “"+hotel+"” copied to the next night");
}
function clearDayStay(dayId){         // the ✕ on a day's 🛏 stay: clear THIS day's hotel (a shared multi-night stay keeps its other nights); drop its pin only if the hotel is now gone from the whole trip
  const d=findDay(dayId);if(!d)return;
  const txt=stayText(d).trim();if(!txt)return;
  pushUndo();
  setDayStay(d,"");                   // d.stay → null (only this day's reference; a shared object's other nights are untouched)
  const n=_norm(txt), stillUsed=(CUR.days||[]).some(x=>_norm(stayText(x))===n);   // exact-text: is this hotel still on another night?
  if(!stillUsed)                       // fully removed → drop its stay pin(s), matching the label tightly (never a different hotel)
    CUR.places=(CUR.places||[]).filter(p=>!(p.type==="stay"&&!isItemPlace(p)&&(()=>{const l=_norm(p.label);return !!l&&(l===n||l.includes(n)||n.includes(l));})()));
  tripMapCache.delete(CUR.id);scheduleSave();softRedraw();
  toast("🛏 Cleared this day's stay");
}

  const b=document.getElementById("addPlaceBtn");
  if(b){b.classList.toggle("primary",on);b.classList.toggle("ghost",!on);b.textContent=on?"📍 Click the map…":"📍 Add place";}

function onTripMapClick(lat,lng){
  if(!ADDPLACE)return;
  setAddPlace(false);                                  // one-shot: disarm after the click (so panning still works)
  PENDXP={lat,lng,label:"",kind:""};
  showAddPlaceForm();
  reverseGeocode(lat,lng).then(res=>{                  // backfill the suggested name + auto-detected type once they resolve
    if(!PENDXP||PENDXP.lat!==lat||PENDXP.lng!==lng||!res)return;
    if(res.label){
      PENDXP.label=res.label;
      const inp=document.querySelector("#addplaceform .ap-name");
      if(inp&&!inp.value){inp.value=res.label;inp.select();}   // don't clobber what the user is typing
    }
    if(res.kind&&res.kind!=="other"){                         // only override for a confident category (restaurant→meal, hotel→stay, sight→activity); never auto-pick "other"
      PENDXP.kind=res.kind;
      const sel=document.querySelector("#addplaceform .ap-type");
      if(sel&&!PENDXP.typeTouched)sel.value=res.kind;          // default the type, unless the user already picked one
    }
  });
}
async function reverseGeocode(lat,lng){
  try{const r=await fetch("/api/geocode/reverse",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({lat,lng})}).then(x=>x.json());
    return r&&r.ok?{label:r.label||"",kind:r.kind||""}:null;}catch(e){return null;}
}

function cancelAddPlace(){PENDXP=null;const h=document.getElementById("addplaceform");if(h){h.style.display="none";h.innerHTML="";}}
function addPlaceLine(name,day,type,lat,lng){            // shared core: drop a map marker, plus either an itinerary line or (for a hotel) the night's 🛏 stay
  LASTDAY=day;                                          // remember it so the next add-menu defaults to this day

  CUR.places=CUR.places||[];
  const d=days_at(day);
  let asStay=false;
  if(d&&type==="stay"&&!stayText(d).trim()){             // a hotel with no stay set yet -> fill the 🛏 footer (a stay item, no items[] line)
    const so=setDayStay(d,name);if(so&&so.geo){so.geo.q=name;so.geo.lat=(lat==null?null:+lat);so.geo.lng=(lng==null?null:+lng);}

    d.items=d.items||[];
    const it={id:uid("i"),type:placeTypeToItem(type)||"activity",text:name,geo:{q:name,lat:(lat==null?null:+lat),lng:(lng==null?null:+lng)}};
    d.items.push(it);

function mapSearchKey(ev){

  else if(ev.key==="Escape"){ev.preventDefault();closeMapSearch();}

function mapSearchInput(el){                                  // search as you type (debounced); Enter still searches immediately via mapSearchKey
  const q=(el.value||"").trim();

    else showPickOnMap();                                     // back to the "pick on the map" shortcut

async function doMapSearch(q){
  q=(q||"").trim();if(!q){closeMapSearch();return;}
  const host=document.getElementById("mapsearchresults");if(!host)return;
  const seq=++_searchSeq;                                     // newest query wins — a slower earlier request won't clobber it
  host.style.display="block";host.innerHTML=`<div class="msr-empty">Searching “${esc(q)}” …</div>`;
  let results=await gplacesSearch(q);                         // Google Places first — far better POI / business coverage
  if(seq!==_searchSeq)return;                                 // superseded by a newer keystroke
  if(!results||!results.length)results=await osmSearch(q);    // fall back to OSM/Nominatim (also the Leaflet / no-key path)
  if(seq!==_searchSeq)return;
  MAPSEARCH=results||[];renderSearchResults(q);
}
async function osmSearch(q){
  try{const r=await fetch("/api/geocode/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:q})}).then(x=>x.json());return (r&&r.results)||[];}
  catch(e){return [];}
}
async function gplacesSearch(q){                              // client-side Google Places text search (same key + lib the detail panel already uses)
  try{
    await ensureGoogle();
    const {Place}=await google.maps.importLibrary("places");
    const req={textQuery:q,fields:["displayName","location","formattedAddress","types"],maxResultCount:6,language:"en"};
    const p0=(CUR.places||[]).find(p=>p.lat&&p.lng);          // bias toward the trip's region when we already have one
    if(p0)req.locationBias={center:{lat:p0.lat,lng:p0.lng},radius:50000};
    const {places}=await Place.searchByText(req);
    return (places||[]).map(p=>{
      const loc=p.location;if(!loc)return null;
      const lat=(typeof loc.lat==="function")?loc.lat():loc.lat, lng=(typeof loc.lng==="function")?loc.lng():loc.lng;
      if(lat==null||lng==null)return null;
      const dn=p.displayName, label=(dn&&dn.text)?dn.text:(typeof dn==="string"?dn:q);
      const addr=p.formattedAddress||"", detail=addr.split(",").slice(0,2).join(",").trim();
      return {label,lat,lng,kind:gplacesKind(p.types),detail};
    }).filter(Boolean);
  }catch(e){return null;}                                     // Places unavailable / error -> signal fallback to OSM
}
function gplacesKind(types){                                  // Google place types -> our activity/meal/stay/other buckets
  const t=new Set((types||[]).map(s=>String(s).toLowerCase())), any=(...xs)=>xs.some(x=>t.has(x));
  if(any("lodging","hotel","resort_hotel","motel","guest_house","bed_and_breakfast","hostel","campground","rv_park","cottage"))return "stay";   // a hotel is a stay even if it also has a bar/restaurant
  if(any("bar","pub","night_club","brewery","wine_bar")&&!any("restaurant","cafe","bakery"))return "bar";   // a pure drinking spot; a restaurant/cafe that also has a bar stays 'meal'
  if(any("restaurant","cafe","bar","bakery","meal_takeaway","meal_delivery","food","ice_cream_shop","coffee_shop","fast_food_restaurant"))return "meal";
  if(any("museum","art_gallery"))return "museum";
  if(any("ski_resort"))return "ski";
  if(any("hiking_area"))return "hiking";
  if(any("scuba_diving","dive_shop","diving_center"))return "dive";   // not a standard Google type yet — harmless, future-proof (diving spots otherwise fall to 'activity')
  if(any("tourist_attraction","park","national_park","amusement_park","zoo","aquarium","church","mosque","synagogue","hindu_temple","place_of_worship","point_of_interest","landmark","natural_feature","stadium","historical_landmark","monument"))return "activity";
  return "other";
}

function spliceTok(text,re,rep){
  const m=text.match(re);
  if(m)return (text.slice(0,m.index)+rep+text.slice(m.index+m[0].length)).replace(/[ \t]{2,}/g," ").replace(/\s+$/,"");
  if(!rep)return text;
  return text.trim()?text.trim()+" "+rep:rep;
}
function spliceFlightTime(text,rep){
  const res=[/(\d{1,2}(?::\d{2})?)\s*(?:AM|PM)?\s*[-–—]\s*(\d{1,2}(?::\d{2})?)\s*(?:AM|PM)\b\s*(?:\+\d)?/i,
            /\b\d{1,2}:\d{2}\s*[-–—]\s*\d{1,2}:\d{2}\b\s*(?:\+\d)?/,
            /\b\d{3,4}\s*[-–—]\s*\d{3,4}\b\s*(?:\+\d)?/,
            /\b\d{1,2}:\d{2}\s*(?:AM|PM)?\s*$/i];   // a LONE trailing time = the dep this splicer appended one keystroke ago — replace it when the full range arrives (else "X 09:05" became "X 09:05 09:05-12:24")
  for(const re of res){const m=text.match(re);if(m)return (text.slice(0,m.index)+rep+text.slice(m.index+m[0].length)).replace(/[ \t]{2,}/g," ").replace(/\s+$/,"");}
  if(!rep)return text;
  return text.trim()?text.trim()+" "+rep:rep;
}
function bindFlight(el){     // edit one recognized token in place; .ie-fltext (full text) is the source of truth

  const ta=wrap&&wrap.querySelector(".ie-fltext"); if(!it||!box||!ta)return;

function normTime(s){          // parse a freely-typed time → 24h "HH:MM" (or "" if blank/unparseable). Accepts 1700 / 17:00 / 5 / 5:30 / 5pm / 8.30 / 1730

  if(ampm==="pm"&&h<12)h+=12;
  if(ampm==="am"&&h===12)h=0;
  if(h<0||h>23||m<0||m>59)return "";
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function wireDocDrop(){

  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{stop(e);dz.classList.add("over");}));
  ["dragleave","dragend"].forEach(ev=>dz.addEventListener(ev,e=>{stop(e);dz.classList.remove("over");}));
  dz.addEventListener("drop",async e=>{stop(e);dz.classList.remove("over");

    if(files.length)await uploadDocs(files);

async function uploadDocs(files){

/* ---------- editing ---------- */
function findDay(id){return (CUR.days||[]).find(d=>d.id===id);}
function findItem(dayId,itemId){const d=findDay(dayId);return d&&(d.items||[]).find(i=>i.id===itemId);}
function bindField(el){const v=el.textContent.trim();if((CUR[el.dataset.bind]||"")===v){_preEdit=null;return;}if(_preEdit){commitUndo(_preEdit);_preEdit=null;}CUR[el.dataset.bind]=v;scheduleSave();}
function bindDay(el){const d=findDay(el.dataset.day);if(!d)return;const k=el.dataset.bind,v=el.textContent.trim();
  const cur=(k==="stay")?stayText(d):(d[k]||"");if(cur===v){_preEdit=null;return;}
  if(_preEdit){commitUndo(_preEdit);_preEdit=null;}
  if(k==="stay"){setDayStay(d,v);scheduleSave();
    if((CUR.days||[]).filter(x=>x.stay&&x.stay===d.stay).length>1)softRedraw();   // shared across nights → refresh the other nights so edit-once is visible
  }else{d[k]=v;scheduleSave();}}
function bindInput(el){const it=findItem(el.dataset.day,el.dataset.item);if(!it)return;const k=el.dataset.bind,v=el.value.trim();if((it[k]||"")===v){_preEdit=null;return;}if(_preEdit){commitUndo(_preEdit);_preEdit=null;}it[k]=(k==="link")?(v||undefined):v;
  if(k==="text"&&it.type==="activity"){const g=guessItemType(v);if(g)it.type=g;}   // #7: upgrade the default 🎟 icon from the text — never overrides a manual type pick. (Geocoding is NOT automatic — use the 📍 button to place an item on the map.)
  scheduleSave();}
/* ----- positional dates: a day's date is its index off a fixed anchor, so reorder/insert/delete keep the sequence chronological ----- */
function fmtISO(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}   // LOCAL Y-M-D (toISOString would shift the day in +UTC zones)
function isoAddDays(iso,n){const d=parseISO(iso);if(!d)return iso;d.setDate(d.getDate()+n);return fmtISO(d);}
function tripAnchorISO(){          // the ISO date that maps to day index 0 = earliest valid day date, else the trip's startDate, else none (undated trip)
  let best=null;
  for(const d of (CUR.days||[])){const p=parseISO(d.date);if(p&&(best===null||p<best))best=p;}
  if(best===null&&CUR.startDate)best=parseISO(CUR.startDate);
  return best?fmtISO(best):null;
}
function reindexDates(){           // rewrite every day's date as anchor+index; leaves a fully-undated trip alone
  const days=CUR.days||[],a=tripAnchorISO();
  if(!a)return;
  days.forEach((d,i)=>{d.date=isoAddDays(a,i);});
  if(days.length){CUR.startDate=days[0].date;CUR.endDate=days[days.length-1].date;}
  syncDateLabels();               // an "M/D" label is the source's terse DATE, not a name -> keep it following the date
}
function syncDateLabels(){         // a day label like "6/5" mirrors its date (the source wrote terse M/D labels); reorder/insert/delete shift the date, so re-derive these labels. A real custom name (or an undated day) is left alone.
  (CUR.days||[]).forEach(d=>{if(parseISO(d.date)&&/^\d{1,2}\/\d{1,2}$/.test((d.label||"").trim()))d.label=fmtDayDate(d.date);});
}
function remapPlaceDays(oldOrderIds){   // places key their day by ORDINAL number; after a reorder/insert/delete, repoint each to its day's NEW ordinal so map pins keep matching the itinerary
  if(!CUR.places||!CUR.places.length)return;
  const newOrd={};(CUR.days||[]).forEach((d,i)=>newOrd[d.id]=i+1);
  CUR.places.forEach(p=>{const id=oldOrderIds[(p.day||1)-1];if(id&&newOrd[id])p.day=newOrd[id];});
}
function setDayDate(dayId,iso){     // editing any day's date shifts the WHOLE trip so that day lands on it, keeping all days consecutive (edit day 1 = set the trip's start)
  const days=CUR.days||[],idx=days.findIndex(d=>d.id===dayId);
  if(idx<0||!parseISO(iso))return;
  pushUndo();
  const anchor=isoAddDays(iso,-idx);
  days.forEach((d,i)=>{d.date=isoAddDays(anchor,i);});
  if(days.length){CUR.startDate=days[0].date;CUR.endDate=days[days.length-1].date;}
  syncDateLabels();               // M/D labels follow the shifted dates
  scheduleSave();softRedraw();
}
function addDayAt(index){           // insert a blank day at a position; following days' dates shift +1 (顺延)
  pushUndo();
  const days=CUR.days=CUR.days||[];
  const oldIds=days.map(d=>d.id);
  const i=Math.max(0,Math.min(index|0,days.length));
  days.splice(i,0,{id:uid("d"),date:"",label:"",stay:"",items:[]});
  remapPlaceDays(oldIds);           // bump stay/orphan pins on the shifted days to their new day numbers
  syncPlaceDays();                  // item-linked pins follow their item to its new day ordinal
  reindexDates();
  tripMapCache.delete(CUR.id);      // rebuild the map so pin numbers/colors refresh
  CUR.structured=true;softRedraw();scheduleSave();
}
function setItem(dayId,itemId,k,v){const it=findItem(dayId,itemId);if(!it)return;pushUndo();it[k]=v;if(k==="type"){EDITLEGS=null;syncItemPlace(dayOrdinalOf(dayId),it);tripMapCache.delete(CUR.id);}scheduleSave();softRedraw();}   // changing the icon restyles its pin (place type follows item type; a flight/transfer drops its marker)
function addItemAt(dayId,idx){const d=findDay(dayId);if(!d)return;pushUndo();const ni={id:uid("i"),type:"activity",text:"",geo:{q:"",lat:null,lng:null}};(d.items=d.items||[]).splice(idx,0,ni);EDITITEM=ikey(dayId,ni.id);softRedraw();scheduleSave();focusEditor();}
function delItem(dayId,itemId){const d=findDay(dayId);if(!d)return;pushUndo();const it=findItem(dayId,itemId);if(it)removeItemPlace(it);d.items=(d.items||[]).filter(i=>i.id!==itemId);if(EDITITEM===ikey(dayId,itemId))EDITITEM=null;syncPlaceDays();tripMapCache.delete(CUR.id);softRedraw();scheduleSave();}
function addDay(){
  pushUndo();
  const days=CUR.days=CUR.days||[];
  days.push({id:uid("d"),date:"",label:"",stay:"",items:[]});
  reindexDates();                                   // append → next consecutive date (no pin shift; rebuild so the color gradient restretches over the new day count)
  tripMapCache.delete(CUR.id);
  CUR.structured=true;softRedraw();scheduleSave();
}
function delDay(id){
  if(!confirm("Delete this day and its items?"))return;
  const days=CUR.days||[],idx=days.findIndex(d=>d.id===id);if(idx<0)return;
  pushUndo();
  const D=idx+1,oldIds=days.map(d=>d.id);
  CUR.days=days.filter(d=>d.id!==id);
  if(CUR.places)CUR.places=CUR.places.filter(p=>(p.day||1)!==D);   // drop the deleted day's pins
  remapPlaceDays(oldIds);                                          // pull the rest down a number
  syncPlaceDays();                                                 // item-linked pins follow their item (and drop with deleted items)
  reindexDates();
  tripMapCache.delete(CUR.id);
  softRedraw();scheduleSave();
}
function softRedraw(){drawTrip();}

function scheduleSave(){
  if(PRINTMODE)return;   // the headless PDF renderer is READ-ONLY — its backfill heals must never race a live client's autosave
  const s=$("#savestate");if(s)s.textContent="saving…";
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    const saving=CUR;saving.structured=true;
    try{
      const r=await api.save(saving);
      if(r&&r.sourceFolder&&CUR&&CUR.id===saving.id)CUR.sourceFolder=r.sourceFolder;   // server may have created/renamed this trip's Travel Plan folder
      const s=$("#savestate");if(s)s.textContent="saved ✓";setTimeout(()=>{const x=$("#savestate");if(x&&x.textContent==='saved ✓')x.textContent='';},1500);
    }catch(e){const s=$("#savestate");if(s)s.textContent="save failed";toast("Save failed");}
  },500);
}

/* ---------- drag & drop ---------- */
function wireSortables(){
  // touch: the ⠿ grips are hover-only, so drag = LONG-PRESS the row itself (250ms hold; a scroll flick
  // moves >6px first and never starts a drag). filter keeps drags from starting inside the editor's fields.
  const touch=IS_TOUCH?{delayOnTouchOnly:true,delay:250,touchStartThreshold:6,
    filter:"input,textarea,select,button,a,[contenteditable]",preventOnFilter:false}:{};
  // items: within a day AND across days (shared group); draggable:".item" so the inline ＋ insert rows don't drag
  document.querySelectorAll(".items").forEach(cont=>{
    new Sortable(cont,{group:"items",handle:IS_TOUCH?undefined:"[data-itemhandle]",draggable:".item",animation:140,
      ghostClass:"sortable-ghost",chosenClass:"sortable-chosen",...touch,
      onEnd:moveItem});
  });
  // days: reorder (touch: long-press the date column)
  const dl=$("#daylist");
  if(dl)new Sortable(dl,{group:"days",handle:IS_TOUCH?".dhead":"[data-dayhandle]",draggable:".day",animation:140,
    ghostClass:"sortable-ghost",...touch,onEnd:moveDay});
}
function moveItem(ev){
  const fromId=ev.from.dataset.day, toId=ev.to.dataset.day;
  const from=findDay(fromId), to=findDay(toId);
  if(!from||!to)return;
  const itemId=ev.item&&ev.item.dataset.item;
  const oi=(from.items||[]).findIndex(i=>i.id===itemId);   // id-based: robust to the interleaved insert rows
  if(oi<0)return;
  pushUndo();
  const [it]=from.items.splice(oi,1);
  const nodes=[...ev.to.querySelectorAll(":scope > .item")];
  let ni=nodes.indexOf(ev.item);if(ni<0)ni=to.items.length;
  to.items.splice(ni,0,it);
  syncPlaceDays();tripMapCache.delete(CUR.id);   // the moved item's pin follows it to the new day (re-color/re-number)
  scheduleSave();softRedraw();   // re-render to re-place insert rows + rebind handlers
}
function moveDay(ev){
  pushUndo();
  const oldIds=CUR.days.map(d=>d.id);
  const order=[...document.querySelectorAll('#daylist .day')].map(el=>el.dataset.day);   // adopt the post-drag DOM order — robust to the interleaved insert rows (ev.oldIndex/newIndex aren't)
  CUR.days.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  remapPlaceDays(oldIds);                                                                 // stay/orphan pins follow their content to the new day numbers
  syncPlaceDays();                                                                        // item-linked pins follow their item to its new day ordinal
  reindexDates();                                                                         // dates follow the new positions
  tripMapCache.delete(CUR.id);                                                            // rebuild the map so pin numbers/colors refresh
  scheduleSave();softRedraw();
}

/* ---------- global map ---------- */
let gmap=null,gLayer=null,gmapG=null,gIWG=null,gMarkersG=[],GENGINE="leaflet",
    GTRIPS=[],GYEARS=[],GYEAR="all";
async function renderMap(){
  $("#hdrExtra").innerHTML=`<button class="btn ghost sm" onclick="location.hash='#/'">← All trips</button>`;
  GTRIPS=(await api.trips()).filter(t=>!t.archive&&t.mapPoints&&t.mapPoints.length);
  GYEARS=[...new Set(GTRIPS.map(t=>(t.startDate||"").slice(0,4)).filter(Boolean))].sort().reverse();
  $("#app").innerHTML=`<div class="maptools" id="maptools"></div><div id="map"></div>`;
  drawMapTools();
  ensureGoogle().then(initGlobalGoogle).catch(initGlobalLeaflet);
}
function drawMapTools(){
  const yb=["all",...GYEARS].map(y=>`<button class="yr ${GYEAR===y?'on':''}" onclick="setGYear('${y}')">${y==="all"?"All":y}</button>`).join("");
  const el=$("#maptools");if(!el)return;
  el.innerHTML=yb+
    `<span class="lg"><span class="sw" style="background:#1f9d57"></span>Upcoming</span>`+
    `<span class="lg"><span class="sw" style="background:#2f6df0"></span>Past</span>`+
    `<span class="lg"><span class="sw" style="background:#8a93a2"></span>Cancelled</span>`;
}
function setGYear(y){GYEAR=y;drawMapTools();drawGlobalMap();}
function initGlobalLeaflet(){
  GENGINE="leaflet";
  gmap=L.map("map",{worldCopyJump:true}).setView([25,10],2);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
    {attribution:"© OpenStreetMap © CARTO",maxZoom:18}).addTo(gmap);
  gLayer=L.layerGroup().addTo(gmap);
  drawGlobalMap();
}
function initGlobalGoogle(){
  GENGINE="google";
  gmapG=new google.maps.Map(document.getElementById("map"),gMapOpts({center:{lat:25,lng:10},zoom:2,streetViewControl:false}));
  gIWG=new google.maps.InfoWindow();
  drawGlobalMap();
}
function filteredTrips(){
  return GYEAR==="all"?GTRIPS:GTRIPS.filter(t=>(t.startDate||"").slice(0,4)===GYEAR);
}
// Global-map dots for a trip: auto-derived clustered stays (t.mapPoints in the index, one
// per region stayed in — a long multi-place trip yields several). Each entry is [lat,lng].
function tripPts(t){return t.mapPoints||[];}
function tripColor(t){
  const up=(t.endDate||t.startDate||"")>=todayISO()&&t.status!=="cancelled";
  return t.status==="cancelled"?"#8a93a2":(up?"#1f9d57":"#2f6df0");
}
function gPopup(t){return `<b>${esc(t.title)}</b><br>${esc(fmtRange(t))}${t.dayCount?` · ${t.dayCount} days`:""}<br><a href="#/trip/${encodeURIComponent(t.id)}">Open →</a>`;}
function drawGlobalMap(){return GENGINE==="google"?drawGlobalGoogle():drawGlobalLeaflet();}
function drawGlobalLeaflet(){
  gLayer.clearLayers();
  const trips=filteredTrips(),pts=[];
  trips.forEach(t=>{
    tripPts(t).forEach(c=>{pts.push(c);
      L.circleMarker(c,{radius:7,fillColor:tripColor(t),color:"#fff",weight:2,fillOpacity:.92}).addTo(gLayer).bindPopup(gPopup(t));});
  });
  if(pts.length)gmap.fitBounds(pts,{padding:[40,40]});
}
function drawGlobalGoogle(){
  gMarkersG.forEach(m=>m.setMap(null));gMarkersG=[];
  const trips=filteredTrips(),bounds=new google.maps.LatLngBounds();
  trips.forEach(t=>{
    tripPts(t).forEach(pt=>{
      const c={lat:pt[0],lng:pt[1]};bounds.extend(c);
      const m=new google.maps.Marker({position:c,map:gmapG,title:t.title,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:7,fillColor:tripColor(t),fillOpacity:.95,strokeColor:"#fff",strokeWeight:2}});
      m.addListener("click",()=>{gIWG.setContent(gPopup(t));gIWG.open(gmapG,m);});
      gMarkersG.push(m);
    });
  });
  if(trips.length)gmapG.fitBounds(bounds,40);
}
</script>
