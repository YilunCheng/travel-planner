<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Travel Planner">
<title>Travel Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2129; --muted:#6b7280; --line:#e6e8ec;
  --accent:#2f6df0; --accent-soft:#eaf1fe; --shadow:0 1px 3px rgba(20,28,40,.08),0 8px 24px rgba(20,28,40,.06);
  --radius:14px;
  --flight:#2f6df0; --transfer:#0f9b8e; --hotel:#6b5bd6; --activity:#1f9d57; --meal:#d98316; --note:#8a93a2;
  --cruise:#119bb0; --work:#5f6b80; --rest:#7a9b4e;
  --ski:#38a8d8; --hiking:#7a8c39; --museum:#9a5fa0; --dive:#0e7aa6; --train:#c0455e; --bar:#c85d8e;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#0e1116; --panel:#161a21; --ink:#e8eaed; --muted:#9aa3b2; --line:#262c36;
    --accent:#5b8cff; --accent-soft:#1a2233; --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35); }
}
*{box-sizing:border-box;touch-action:manipulation}   /* no 300ms double-tap-zoom delay; dblclick works on touch. Leaflet/Google override on their own containers (higher specificity/inline), so map gestures are untouched */
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--ink);box-shadow:var(--shadow);transition:.12s}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.ghost{box-shadow:none;background:transparent}
.btn.sm{padding:4px 9px;font-size:13px;border-radius:7px}
.btn.danger{color:#c0392b;border-color:#e8b9b3}
.btn.danger:hover{background:#fdeaea;border-color:#c0392b}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:12.5px;background:var(--accent-soft);color:var(--accent)}
.search{padding:4px 12px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font:inherit;font-size:13px;width:180px;outline:none}   /* match .btn.sm height so the home header == the trip header */
.search:focus{border-color:var(--accent)}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:600;letter-spacing:.02em}
.badge.cancel{background:#fdeaea;color:#c0392b}
.badge.raw{background:#eef0f3;color:#7a828f}
.badge.soon{background:#e7f5ee;color:#1f7a4d}
@media (prefers-color-scheme:dark){.badge.cancel{background:#3a1f22;color:#ff8a80}.badge.raw{background:#222833;color:#9aa3b2}.badge.soon{background:#16301f;color:#5fcf8f}}

/* top bar */
header.top{position:sticky;top:0;z-index:30;backdrop-filter:saturate(180%) blur(12px);background:color-mix(in srgb,var(--bg) 82%,transparent);border-bottom:1px solid var(--line)}
.top .wrap{max-width:1180px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px}
.brand{font-weight:700;font-size:17px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;cursor:pointer}
.brand .dot{color:var(--accent)}
.spacer{flex:1}
.wrap-main{max-width:1180px;margin:0 auto;padding:22px 20px 60px}

/* library */
.section-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:26px 4px 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.14s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card .cover{aspect-ratio:4/3;background:linear-gradient(135deg,#9db4e8,#6b5bd6);position:relative;overflow:hidden}
.card .cover img{width:100%;height:100%;object-fit:cover;display:block}
.card .cover .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:800;color:rgba(255,255,255,.85)}
.card .cover .cnr{position:absolute;left:10px;top:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;max-width:calc(100% - 20px)}
.card .cover .ord{background:rgba(0,0,0,.45);color:#fff;border-radius:7px;padding:2px 8px;font-size:12px;font-weight:600}
.card .cover .covtools{position:absolute;right:8px;bottom:8px;display:flex;gap:6px;opacity:0;transition:.15s}
.card:hover .cover .covtools{opacity:1}
.covbtn{width:30px;height:30px;border-radius:8px;background:rgba(0,0,0,.55);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.25)}
.covbtn:hover{background:rgba(0,0,0,.82)}
.card .body{padding:12px 13px 14px}
.card .ttl{font-weight:680;font-size:15.5px;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.card .when{color:var(--muted);font-size:13px;margin-top:3px}
.card.cancelled .cover{filter:grayscale(.8) opacity(.7)}

/* trip detail */
.detail{display:grid;grid-template-columns:1fr 312px;gap:24px;align-items:start}
@media(max-width:880px){.detail{grid-template-columns:1fr}}
.thead{display:flex;align-items:flex-start;gap:14px;margin-bottom:6px}
.thead h1{margin:0;font-size:26px;letter-spacing:-.02em}
.thead .sub{color:var(--muted);margin-top:4px}
.triptabs{display:flex;gap:2px;margin:16px 0 18px;border-bottom:1px solid var(--line)}
.ttab{appearance:none;-webkit-appearance:none;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font:inherit;font-weight:600;padding:7px 13px;margin-bottom:-1px;cursor:pointer;transition:color .12s,border-color .12s}
.ttab:hover{color:var(--ink)}
.ttab.on{color:var(--accent);border-bottom-color:var(--accent)}
.docdrop{border:1.5px dashed var(--line);border-radius:var(--radius);padding:16px;margin:0 0 14px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;background:var(--panel);transition:.12s}
.docdrop:hover{border-color:var(--accent);color:var(--ink)}
.docdrop.over{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.docdrop.busy{opacity:.6;pointer-events:none}
.docdrop b{color:var(--ink);font-weight:600}
.daylist{display:flex;flex-direction:column;gap:4px;margin-top:8px;margin-bottom:12px}
.dayins{height:0;display:flex;align-items:center;justify-content:center;position:relative;z-index:6;pointer-events:none}
.dayins button{pointer-events:auto;opacity:0;font-size:11px;font-weight:700;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:1px 10px;line-height:1.5;cursor:pointer;box-shadow:var(--shadow);transition:opacity .12s,color .12s,background .12s,border-color .12s}
.daylist:hover .dayins button{opacity:.6}
.dayins button:hover{opacity:1;color:#fff;background:var(--accent);border-color:var(--accent)}
.day{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.day .dgrid{display:grid;grid-template-columns:70px 1fr}
.day .dhead{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:0;padding:9px 3px 7px;border-right:1px solid var(--line);background:color-mix(in srgb,var(--panel) 92%,var(--accent-soft))}
.day .cdom{font-size:20px;font-weight:800;line-height:1;color:var(--accent)}
.day .cmon{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--accent);margin-top:1px}
.day .cwk{font-size:10px;color:var(--muted);margin-top:4px;text-align:center;line-height:1.2}
.day .dbody{min-width:0;padding:6px 10px 6px 6px}
.daywx{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;padding:0}
.day .dhead .daywx{margin-top:6px}
.day .dhead .daywx .dwx-i{font-size:11px}
.day .dhead .daywx .dwx-pop{display:none}   /* the narrow date column shows temp only — rain % is in the hover tip */
.day .dhead>.grip{position:absolute;top:3px;left:3px}
.day .dhead .dctrls{position:absolute;top:2px;right:2px;left:auto;bottom:auto;gap:2px;justify-content:flex-end;margin:0}   /* top-right corner so the hover controls never sit on the bottom weather chip */
.day .dhead .dctrls .iconbtn{width:18px;height:18px;font-size:12px}
.item .bar,.day .daystay .bar{display:none}   /* no per-row colour stripes — the type is shown by the icon */
.daywx:hover{background:color-mix(in srgb,var(--panel) 80%,var(--accent-soft))}
.daywx .dwx-i{font-size:13px}
.daywx .dwx-pop{color:var(--accent);font-weight:600}
.wxcard{margin:12px 0 4px;padding:9px 13px;border:1px solid var(--line);border-radius:11px;background:color-mix(in srgb,var(--panel) 94%,var(--accent-soft))}
.wxc-row{display:flex;align-items:center;gap:11px}
.wxc-ic{font-size:25px;line-height:1;flex:0 0 auto}
.wxc-main{flex:1;min-width:0}
.wxc-ttl{font-size:13.5px;font-weight:700;color:var(--ink)}
.wxc-sub{font-size:13px;font-weight:600;color:var(--muted);margin-top:1px}
.wxc-foot{font-size:10.5px;color:var(--muted);margin-top:4px}
/* collapsible header */
.wxc-hdr{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.wxc-hdr-t{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.wxc-chev{width:0;height:0;border-left:5px solid var(--muted);border-top:4px solid transparent;border-bottom:4px solid transparent;transform:rotate(90deg);transition:transform .12s}
.wxc-collapsed .wxc-chev{transform:rotate(0)}
.wxc-peek{display:none;font-size:12.5px;font-weight:650;color:var(--ink)}
.wxc-collapsed .wxc-peek{display:inline}
.wxc-body{margin-top:8px}
.wxc-collapsed .wxc-body{display:none}
/* per-day weather hover tooltip */
.wxtip{position:fixed;z-index:60;display:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:8px 11px;font-size:12px;min-width:155px}
.wxc-ai{cursor:help;font-size:13px;line-height:1;opacity:.65;transition:opacity .12s,transform .12s}
.wxc-ai:hover{opacity:1;transform:scale(1.15)}
.wxsum{position:fixed;z-index:61;display:none;width:340px;max-width:92vw;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 12px 36px rgba(0,0,0,.34);padding:11px 13px}
.wxsum-h{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.wxsum-body{font-size:13px;line-height:1.5;color:var(--ink)}
.wxsum-body.muted{color:var(--muted);font-style:italic}
.wxt-h{font-weight:700;font-size:13px;margin-bottom:5px}
.wxt-seg-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:2px 0 1px}
.wxt-r{display:flex;justify-content:space-between;gap:16px;padding:1px 0;color:var(--muted)}
.wxt-r b{color:var(--ink);font-weight:600}
.wxt-sun{display:flex;gap:14px;margin-top:5px;padding-top:5px;border-top:1px solid var(--line);font-weight:600;font-size:12.5px}
.wxs-row{display:flex;align-items:center;gap:9px;padding:3px 0;font-size:13px}
.wxs-row+.wxs-row{border-top:1px dashed var(--line)}
.wxs-ic{font-size:17px;width:20px;text-align:center;flex:0 0 auto}
.wxs-place{font-weight:650;flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wxs-when{color:var(--muted);font-size:12px;flex:0 0 auto}
.wxs-t{font-weight:650;margin-left:auto;flex:0 0 auto}
.wxs-d{color:var(--muted);font-size:12px;flex:0 0 auto;text-align:right}
.day .stay{margin-left:auto;font-size:13px}
.day .daystay{margin:3px 0 0;padding:6px 0 0 5px;border-top:1px solid var(--line);font-size:13px;display:flex;align-items:center;gap:5px;color:var(--muted);background:transparent}
.day .daystay .grip.ghost{display:none}                                              /* grips are absolute now → no spacer needed (🛏 lines up via padding) */
.day .daystay .bar{width:3px;align-self:stretch;border-radius:3px;flex:0 0 auto;background:var(--hotel)}
.day .daystay .ic{width:18px;text-align:center;flex:0 0 auto;font-size:13px}
.day .daystay .staytext{color:var(--ink);font-weight:600;flex:1;min-width:0;cursor:pointer;min-height:1.3em}   /* min-height keeps an EMPTY stay double-clickable — a zero-content flex item otherwise collapses to 0 height and there's nothing to click */
.day .daystay .staygeo{opacity:0;flex:0 0 auto;border:0;background:transparent;cursor:pointer;font-size:13px;line-height:1;padding:0 3px;transition:opacity .12s}
.day .daystay:hover .staygeo{opacity:.65}
.day .daystay .staygeo:hover{opacity:1}
.day .daystay .stayx{color:var(--muted)}
.day .daystay .stayx:hover{color:#e0533d}   /* the ✕ "clear this day's hotel" — red on hover */
.items{padding:0;display:flex;flex-direction:column;min-height:4px}
.item{position:relative;display:flex;align-items:flex-start;gap:5px;padding:0 5px;border-radius:6px}
.item>.grip{position:absolute;left:-3px;top:1px}   /* absolute so the icon sits near the left, not pushed by a grip reserve */
.item:hover{background:color-mix(in srgb,var(--panel) 88%,var(--accent-soft))}
.item .ic{width:18px;text-align:center;flex:0 0 auto;font-size:13px;line-height:1.0}
.item .bar{width:3px;align-self:stretch;border-radius:3px;flex:0 0 auto}
.item .tm{font:600 11px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);flex:0 0 auto;padding-top:1px;min-width:34px}
.item .tm.tmr{display:inline-flex;flex-direction:column;line-height:1.25}              /* start over end */
.item .tm.tmr .t2{opacity:.6;font-weight:500}
.item .tm.tmr sup{font-size:8px;font-weight:600}
.ie-dash{color:var(--muted);align-self:center}
.item .tx{flex:1;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.1}
.item .tx a{text-decoration:underline}
.empty{color:var(--muted);font-size:13.5px;padding:10px 12px}
.rawbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;white-space:pre-wrap;font:13.5px/1.65 ui-monospace,SFMono-Regular,Menlo,monospace;overflow-x:auto}

/* doc panel */
.aside{position:sticky;top:74px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel h3{margin:0;padding:12px 15px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--line)}
.docgrp{padding:6px 8px}
.docgrp .gl{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:8px 7px 4px}
.doc{display:flex;align-items:center;gap:10px;padding:7px;border-radius:9px;cursor:pointer}
.doc:hover{background:var(--accent-soft)}
.doc .th{width:38px;height:38px;border-radius:7px;background:var(--bg);border:1px solid var(--line);object-fit:cover;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted)}
.doc .dn{font-size:13px;line-height:1.35;word-break:break-word}
.doc .dx{font-size:11px;color:var(--muted);text-transform:uppercase}

/* edit affordances (always available, hover-revealed — no separate edit mode) */
.grip{cursor:grab;color:var(--muted);opacity:0;flex:0 0 auto;padding-top:2px;font-size:14px;transition:.1s}
.item:hover>.grip,.dhead:hover>.grip{opacity:.5}
.grip:hover{opacity:1}
[contenteditable]{outline:1px dashed transparent;border-radius:5px;transition:.1s}
[contenteditable]:hover{outline-color:var(--line)}
[contenteditable]:focus{outline:1.5px solid var(--accent);background:var(--panel)}
.tx:empty:before,.staytext:empty:before{content:attr(data-ph);color:var(--muted)}
.ctrls{display:none;gap:4px;margin-left:auto;flex:0 0 auto}
.item:hover .ctrls{display:inline-flex}
.dhead:hover .dctrls{visibility:visible}
.iconbtn{width:22px;height:22px;flex:0 0 auto;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;cursor:pointer}
.iconbtn:hover{background:var(--line);color:var(--ink)}
.iconbtn.danger:hover{background:#fdeaea;color:#c0392b}
.typesel{font-size:12px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:2px 4px;min-width:0;flex:0 1 auto}   /* may shrink to keep the row on one line */
.dctrls{display:inline-flex;visibility:hidden;gap:4px;margin-left:6px;align-items:center}
.btn[disabled]{opacity:.38;pointer-events:none}
/* insert affordance — docked into each row's RIGHT control cluster (＋ = insert below), never a between-row hover
   pill. Nothing floats in the vertical gap the cursor travels through, so there's nothing to mis-tap. */
.ctrls .iconbtn.add{color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 34%,var(--line))}
.ctrls .iconbtn.add:hover{background:var(--accent-soft);border-color:var(--accent)}
.ctrls .sepv{width:1px;align-self:stretch;background:var(--line);margin:3px 2px;flex:0 0 auto}   /* keeps ＋ visually apart from ✎ × so "add" isn't fat-fingered as "delete" */
.item.menuopen{background:color-mix(in srgb,var(--panel) 88%,var(--accent-soft))}   /* while the ＋ menu is open, keep the row active + its controls shown (so the anchor doesn't vanish when the cursor moves onto the menu) */
.item.menuopen .ctrls{display:inline-flex}
/* the ＋ menu (Item / Transport) — a floating popover anchored to the button, appended to <body> so .day{overflow:hidden} can't clip it */
.rowmenu{position:fixed;z-index:70;background:var(--panel);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);padding:4px;display:flex;flex-direction:column;gap:2px;min-width:132px}
.rowmenu .rm-i{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);padding:7px 10px;border-radius:6px;background:none;text-align:left;white-space:nowrap;width:100%}
.rowmenu .rm-i:hover{background:var(--accent-soft)}
.rowmenu .rm-k{font-size:14px;width:16px;text-align:center;flex:0 0 auto}
.rowmenu .rm-grp{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:4px 9px 2px}   /* Above / Below section labels — shown only in the first row's menu */
.rowmenu .rm-sep{height:1px;background:var(--line);margin:3px 6px}
.rowmenu .rm-lbl{font-size:12px;color:var(--muted);padding:4px 8px 3px;white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis}
.rowmenu .rm-modes{display:flex;gap:5px;padding:2px 5px 4px}
.rowmenu .rm-mode{font-size:16px;line-height:1;border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:5px 10px;cursor:pointer}
.rowmenu .rm-mode:hover{background:var(--accent-soft);border-color:var(--accent)}
/* empty-day: a HOVER-revealed ＋ (Item / Transport), not a persistent box — the day reads clean until hovered */
.dayempty{display:flex;align-items:center;min-height:26px;padding:2px 5px}
.deadd{width:24px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;line-height:1;color:var(--accent);border:1px solid transparent;border-radius:7px;background:none;cursor:pointer;opacity:0;transition:opacity .12s,background .12s,border-color .12s}
.day:hover .deadd{opacity:.55}
.deadd:hover,.day.menuopen .deadd{opacity:1;background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 34%,var(--line))}
/* inline item editor (opened by ✎ / double-click) */
.editing-item{flex-wrap:wrap;background:var(--accent-soft);border-radius:10px;align-items:flex-start}
.ie-form{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;padding:2px 0}
.ie-row{display:flex;align-items:center;gap:4px}   /* one line, tight: the two selects shrink (below) before anything overflows the card */
.ie-row-actions{justify-content:flex-end}          /* second header row: day-move + duplicate / done / delete, right-aligned */
.ie-time{width:54px;flex:0 0 auto;font-size:13px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:3px 4px;text-align:center;font-variant-numeric:tabular-nums}
.ie-text{flex:1;min-height:38px;font:inherit;font-size:14px;line-height:1.5;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:6px 8px;resize:vertical}
.ie-fltext{display:none}   /* flight/train edit via the structured fields only; the lossless source text stays in the DOM (binders splice into it) but isn't shown */
.ie-note{min-height:30px;font:inherit;font-size:13px;line-height:1.45;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:5px 8px;resize:vertical}   /* a free note for a structured item (flight/train/transfer) — displayed on its row, separate from the parsed text */
.ie-link{font-size:12.5px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:4px 7px}
.tx[ondblclick]{cursor:pointer}   /* clickable (locate / double-click to edit) → hand, not an I-beam */
[contenteditable="true"]{cursor:text}   /* …but while actually editing, show the text caret */
.ie-time{font-size:13px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:2px 5px}
.iconbtn[disabled]{opacity:.3;pointer-events:none}
/* structured flight / leg editors (Phase 2) */
.ie-fl,.ie-legs{display:flex;flex-direction:column;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px}
.ie-frow{display:flex;align-items:center;gap:7px}
.ie-frow>label{flex:0 0 auto;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.ie-frow>label{width:50px}
.ie-f{font-size:13.5px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--ink);padding:4px 7px;min-width:0}
.ie-f:focus{outline:1.5px solid var(--accent)}
.ie-fno{width:96px}
.ie-trstn{flex:1 1 0;min-width:40px}   /* train station names are free text → share the row */
.ie-trno{flex:1 1 0;min-width:80px}    /* train number / operator — free text, fills its row */
.ie-ft{width:108px;text-align:center;font-variant-numeric:tabular-nums}
.ie-arr{color:var(--muted)}
.ie-plus{display:inline-flex;align-items:center;gap:2px;color:var(--muted);font-size:13px}
.ie-fplus{width:48px}
.ie-legname{flex:1}
.ie-toggle{align-self:flex-start;background:none;border:0;padding:2px 0;cursor:pointer;font-size:12.5px}
.ie-toggle{color:var(--muted);text-decoration:underline}
.ie-toggle:hover{color:var(--accent)}
.ie-movesel{font-size:12px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);padding:2px 4px;max-width:120px;min-width:0;flex:0 1 auto}   /* may shrink to keep the row on one line */
.ie-geo{align-self:flex-start;background:none;border:0;padding:2px 0;cursor:pointer;font-size:12.5px;color:var(--accent)}
.ie-geo:hover{text-decoration:underline}
.ie-georow{display:flex;align-items:center;gap:10px;align-self:flex-start}
.ie-geo.located{color:#1f9d57}                       /* green = this item is on the map */
.ie-geo-x{background:none;border:0;padding:2px 0;cursor:pointer;font-size:12px;color:var(--muted)}
.ie-geo-x:hover{color:#e0533d;text-decoration:underline}
.sortable-ghost{opacity:.4}
.sortable-chosen{background:var(--accent-soft)!important}
.hidden{display:none!important}
#map{height:calc(100vh - 150px);border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow)}
.tripmap{height:340px;border-radius:var(--radius);margin:16px 0 4px;border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;z-index:1}
.tripmap-host{width:100%;height:100%}
.daymrk{display:flex;align-items:center;justify-content:center;width:27px;height:27px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 4px rgba(11,18,32,.42),inset 0 1px 2px rgba(255,255,255,.28);border:2px solid #fff;font-weight:700;font-size:14px;color:#fff}
.daymrk span{transform:rotate(45deg)}
.maplegend{display:flex;flex-wrap:wrap;gap:13px;margin-top:8px;font-size:12px;color:var(--muted)}
.maplegend .lg-item{display:inline-flex;align-items:center;gap:5px}
.maplegend i{width:18px;height:3px;border-radius:2px;display:inline-block}
.item.xlink{background:color-mix(in srgb,var(--accent) 13%,transparent)}
.stay.xlink{outline:2px solid var(--accent);outline-offset:1px;border-radius:8px}
.day.dsel{box-shadow:0 0 0 2px var(--accent),var(--shadow)}
.leaflet-marker-icon.mk-hl{filter:drop-shadow(0 0 7px var(--accent));z-index:1000!important}
/* sticky map column: map stays in view while the itinerary scrolls */
.detail.hasmap{grid-template-columns:minmax(0,1fr) clamp(400px,48vw,720px)}
.detail.pdfmeasure{display:block}                                  /* momentary: measure the itinerary at PRINT width (map hidden) to size a single pageless PDF page */
.detail.pdfmeasure .aside{display:none}
.detail.pdfmeasure .main{width:186mm;max-width:186mm}
.detail.pdfmeasure .dayempty,.detail.pdfmeasure .dayins,.detail.pdfmeasure .wxcard{display:none}   /* hidden in print → don't count them toward the page height */
.detail.pdfmeasure .day{margin:0 0 7px}   /* print ADDS this margin on top of .daylist's 4px gap — without it the measure runs ~7px/day short and the map/last day gets bounced to a page 2 */
.mappane .tripmap{height:calc(100vh - 168px);min-height:340px;max-height:780px;margin:0}
.maphead{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap}
.mapdaylbl{font-weight:700;font-size:14.5px}
.docpanel{margin-top:18px}
.dhead.daysel{cursor:pointer;transition:background .12s}
.dhead.daysel:hover{background:color-mix(in srgb,var(--accent) 9%,var(--panel))}
/* date-band tint: weekend / holiday → green, PTO → blue (manual marks win over the hover tint) */
.dhead.mk-green,.dhead.mk-green.daysel:hover{background:color-mix(in srgb,var(--panel) 82%,#4caf6a)}
.dhead.mk-blue,.dhead.mk-blue.daysel:hover{background:color-mix(in srgb,var(--panel) 82%,#3f9bf0)}
.markdot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--line);background:transparent;cursor:pointer;padding:0;flex:none}   /* per-day mark swatch (in the hover controls): cycles none → holiday(green) → PTO(blue) */
.markdot:hover{border-color:var(--accent)}
.markdot.holiday{background:#4caf6a;border-color:#3a9457}
.markdot.pto{background:#3f9bf0;border-color:#2f86d8}
/* split driving legs in the itinerary, with per-leg drive time */
.item.legitem{align-items:flex-start}
.legs{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
.leg{display:flex;align-items:center;gap:9px}
.legtm{min-width:42px;flex:0 0 auto;display:flex;justify-content:center;align-items:center}
.legdot{width:7px;height:7px;border-radius:50%;background:var(--transfer);flex:none}
.legname{flex:1;min-width:0;font-weight:500;font-size:14px}
/* click/hover a specific place (or hotel) to locate it on the map */
.item.locatable{cursor:pointer}
.leg[data-pi]{cursor:pointer}
.stay.locatable{cursor:pointer}
.leg[data-pi]:hover .legname,.item.locatable:hover .tx{text-decoration:underline;text-underline-offset:2px}
/* drive time shown BETWEEN two leg rows; click it -> route on the map */
.legmove{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.legmove .mvline{width:0;height:7px;border-left:2px dotted var(--transfer);opacity:.65}
.mvbody{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--transfer);font-weight:700;padding:1px 9px;border:1px solid var(--line);border-radius:999px;background:var(--panel)}
.legmove:hover .mvbody{border-color:var(--transfer);background:color-mix(in srgb,var(--transfer) 12%,var(--panel))}
.mvbody .muted{font-weight:500}
/* compact (point-to-point) transport: plain colored text instead of a bordered chip — matches the other item rows; still clickable (underline on hover) */
.legmove.compactxp .mvbody{border:0;background:transparent;padding:0;font-size:11.5px;font-weight:600}
.legmove.compactxp:hover .mvbody{background:transparent;text-decoration:underline;text-underline-offset:2px}
/* route view in the map pane: from -> to, mode switch, time + distance */
.routebox{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:11px}
.modesw{display:flex;gap:6px}
.modebtn{flex:1;padding:7px 4px;border:1px solid var(--line);border-radius:9px;background:var(--panel);font-size:13px;font-weight:600;cursor:pointer}
.modebtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.routestat{font-size:15px;font-weight:700}
.routestat .muted{font-weight:500;color:var(--muted)}
.routeapplywrap:empty{display:none}
.routeapply{width:100%}
.routesteps{display:flex;flex-direction:column;font-size:12.5px}
.stepshd{font-size:12px;font-weight:700;color:var(--muted);margin:2px 0}
.routestep{display:flex;gap:9px;align-items:baseline;padding:7px 2px;border-top:1px solid var(--line)}
.routestep .stepic{flex:0 0 auto;width:15px;text-align:center;color:var(--transfer);font-weight:700}
.routestep .steptx{flex:1;min-width:0}
.routestep .stepd{flex:0 0 auto;color:var(--muted);font-size:11.5px;white-space:nowrap}
/* flight rows + live-info tooltip */
.flightitem .fl{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.fl-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fl-route{font-weight:600}
.fl-arr{color:var(--muted);font-weight:400}
.fl-no{font-size:11.5px;font-weight:700;color:var(--flight);border:1px solid var(--line);border-radius:6px;padding:0 6px;cursor:help}
.fl-sub{font-size:12.5px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;align-items:baseline}
.itemnote{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word;line-height:1.35;margin-top:1px}   /* a free note the user typed for a structured item (flight/train/transfer), shown under its parsed row */
.fl-t{color:var(--ink);font-weight:600}
.fl-plus{font-size:10px;color:var(--flight);font-weight:700;vertical-align:super;margin-left:1px}
.flightitem[data-flno]{cursor:help}
.fltip{position:fixed;z-index:60;width:340px;max-width:92vw;max-height:72vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.34);padding:12px 13px;font-size:13px;display:none}
.fltip-load{color:var(--muted)}
.fl-card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fl-status{margin-left:auto;font-size:11px;font-weight:700;color:var(--flight);background:color-mix(in srgb,var(--flight) 13%,var(--panel));border-radius:6px;padding:1px 7px}
.fl-segs{display:flex;align-items:stretch;gap:10px}
.fl-seg{flex:1;min-width:0}
.fl-seg-t{font-size:18px;font-weight:800;line-height:1.1}
.fl-seg-a{font-size:12.5px;margin-top:2px}
.fl-seg-x{font-size:11px;margin-top:2px;min-height:1em;color:var(--muted)}
.fl-mid{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--flight);font-size:10.5px;text-align:center}
.fl-card-route{font-weight:700;font-size:14px}
.fl-note{font-size:12px;margin:9px 0 6px}
.fl-links{display:flex;gap:14px;margin-top:9px}
.fl-lookup{font-size:12.5px;color:var(--accent);text-decoration:none}
.fl-lookup:hover{text-decoration:underline}
/* Google place detail in the right map pane (Places UI Kit, with Embed-card fallback) */
.maparea{position:relative}
.maparea.addmode .tripmap{cursor:crosshair}
.maparea.addmode .tripmap *{cursor:crosshair !important}
.addplaceform{position:absolute;top:8px;right:8px;width:270px;max-width:calc(100% - 16px);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 34px rgba(0,0,0,.4);z-index:6;flex-direction:column;gap:8px;padding:11px 12px}
.addplaceform .ap-hd{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;color:var(--ink)}
.addplaceform .ap-x{border:0;background:transparent;color:var(--muted);font-size:18px;line-height:1;cursor:pointer;padding:0 2px}
.addplaceform .ap-x:hover{color:var(--ink)}
.addplaceform .ap-name{width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:13.5px}
.addplaceform .ap-row{display:flex;gap:7px}
.addplaceform .ap-row select{flex:1;min-width:0;padding:6px 7px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:12.5px}
.addplaceform .ap-actions .btn{flex:1}
.addplaceform .ap-ll{font-size:11px;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}
.mapsearch{flex:1;min-width:140px;max-width:300px;font-size:13px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);padding:6px 10px}
.mapsearch:focus{outline:none;border-color:var(--accent)}
.mapsearchresults{position:absolute;top:8px;left:8px;width:344px;max-width:calc(100% - 16px);max-height:64%;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 12px 36px rgba(0,0,0,.45);z-index:7}
.tripmap-hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);z-index:6;max-width:86%;text-align:center;font-size:12.5px;line-height:1.55;color:var(--muted);background:color-mix(in srgb,var(--panel) 94%,transparent);border:1px solid var(--line);border-radius:11px;padding:9px 13px;box-shadow:0 8px 26px rgba(0,0,0,.34)}
.tripmap-hint button{margin-top:6px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50}
.modal-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;width:340px;max-width:90vw;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.modal-card h3{margin:0 0 14px;font-size:17px}
.modal-f{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;font-size:12.5px;color:var(--muted)}
.modal-f input{font-size:14px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink)}
.modal-f input:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
.msr-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 11px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);position:sticky;top:0;background:var(--panel)}
.msr-hd .ap-x{border:0;background:transparent;color:var(--muted);font-size:18px;line-height:1;cursor:pointer;padding:0 2px}
.msr-hd .ap-x:hover{color:var(--ink)}
.msr-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;border-bottom:1px solid var(--line);background:transparent;color:var(--ink);padding:9px 11px;cursor:pointer}
.msr-item:last-child{border-bottom:0}
.msr-item:hover{background:var(--accent-soft)}
.msr-ic{font-size:16px;flex:none;width:20px;text-align:center}
.msr-txt{display:flex;flex-direction:column;min-width:0;gap:1px}
.msr-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msr-detail{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msr-empty{padding:12px;font-size:13px;color:var(--muted)}
.msr-pickmap .msr-name{color:var(--accent)}
.placedetail{position:absolute;left:8px;top:8px;bottom:8px;width:clamp(300px,46%,372px);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;z-index:5;box-shadow:0 10px 34px rgba(0,0,0,.4)}
.pdhead{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);flex:none}
.gmname{font-weight:700;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}   /* used by the ROUTE view header (A → B); the place-detail header no longer shows a title */
.pdframe{border:0;width:100%;flex:1}
.gmopen{font-size:12.5px;color:var(--accent);white-space:nowrap;text-decoration:none}
.pdx{font-size:15px;line-height:1;padding:2px 8px;color:var(--muted);font-weight:600;margin-left:auto}   /* push ✕ to the right (the title span that used to do that was removed) */
.pdx:hover{color:var(--ink)}
.gmopen:hover{text-decoration:underline}
.gmnokey{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:16px}
.pdbody{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;background:var(--panel)}
.pdbody .pdframe{flex:1;min-height:220px}
.pdbody .pdkit,.pdbody gmp-place-details{width:100%;flex:1;min-height:0}
.pdadd{display:flex;align-items:center;gap:8px;padding:8px 10px;border-top:1px solid var(--line);flex:none;background:var(--panel)}
.pdadd-lbl{font-size:12.5px;color:var(--muted);flex:none}
.pdadd-day{flex:1;min-width:0;font-size:12.5px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);padding:5px 7px}
.pdadd .btn{flex:none}
.gmload{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);padding:24px;font-size:13px}
/* place-detail drawer: compact type (overrides the per-rule sizes above; covers the Google card chrome + the route view) */
.placedetail{font-size:12.5px}
.placedetail .gmname{font-size:13px}
.placedetail .gmopen,.placedetail .pdadd-lbl,.placedetail .pdadd-day{font-size:11.5px}
.placedetail .gmload{font-size:12px}
.placedetail .modebtn{font-size:12px}
.placedetail .routestat{font-size:13.5px}
.placedetail .routesteps{font-size:11.5px}
.placedetail .stepshd,.placedetail .routestep .stepd{font-size:11px}
.placedetail .pdkit,.placedetail gmp-place-details{font-size:13px}
.muted{color:var(--muted);font-weight:400}
/* drive-time labels on map segments */
.drivelbl{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:0 6px;font-size:11px;font-weight:700;color:#0b7d72;box-shadow:0 1px 3px rgba(0,0,0,.25);white-space:nowrap;width:auto!important;height:auto!important;margin:0!important}
.gdrivelbl{text-shadow:0 1px 3px #fff,0 0 4px #fff,0 0 4px #fff}
.maptools{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px}
.maptools .yr{padding:4px 11px;border-radius:8px;border:1px solid var(--line);background:var(--panel);font-size:13px;cursor:pointer}
.maptools .yr.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.maptools .lg{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--muted);margin-left:4px}
.maptools .vsep{width:1px;height:20px;background:var(--line);margin:0 4px;display:inline-block}
.maptools .sw{width:11px;height:11px;border-radius:50%;display:inline-block}
.leaflet-popup-content{font:13px/1.45 -apple-system,sans-serif}
.leaflet-container{font:inherit}
/* marker popup themed to the app — light by day, dark by night (the bubble + text both follow --panel/--ink) */
.iwbox{color:var(--ink);font:11.5px/1.4 -apple-system,system-ui,sans-serif;min-width:100px;width:max-content;max-width:248px;box-sizing:content-box;padding:1px 9px 5px 0}   /* size to the WIDEST line (the actions) so "🗑 Remove" isn't clipped; content-box keeps padding OUTSIDE the max-content width for right/bottom breathing room */
.iw-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.iwbox .iw-names{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}   /* a merged pin lists every item at that spot */
.iwbox .iw-name{font-weight:700;font-size:12.5px;color:var(--ink)}
.iwbox .iw-day{color:var(--muted);font-weight:400;font-size:11px}   /* the per-item day on a merged pin */
.iwbox .iw-sub{color:var(--muted);font-size:11px;margin:1px 0 5px}
.iw-x{flex:none;border:0;background:transparent;cursor:pointer;font-size:15px;line-height:1;color:var(--muted);font-weight:600;padding:1px 5px;margin:-2px -4px 0 0;border-radius:5px}
.iw-x:hover{color:var(--ink);background:var(--accent-soft)}
/* Leaflet popup bubble → app theme (app CSS loads after the Leaflet CDN, so no !important needed) */
.leaflet-popup-content-wrapper{background:var(--panel);color:var(--ink);box-shadow:0 8px 26px rgba(0,0,0,.34)}
.leaflet-popup-tip{background:var(--panel);box-shadow:none}
.leaflet-popup-close-button{color:var(--muted)}
.leaflet-popup-close-button:hover{color:var(--ink)}
/* Google InfoWindow bubble → app theme (Google injects its own CSS at runtime, so override with !important) */
.gm-style .gm-style-iw-c{background:var(--panel)!important;box-shadow:0 8px 26px rgba(0,0,0,.34)!important;max-width:none!important;max-height:none!important}
.gm-style .gm-style-iw-d{background:var(--panel)!important;overflow:hidden!important;max-width:none!important;max-height:none!important}   /* fit the bubble to its content — kill Google's spurious scroll bars */
.gm-style .gm-style-iw-tc::after{background:var(--panel)!important}
@media (prefers-color-scheme:dark){.gm-style-iw button.gm-ui-hover-effect{filter:invert(.85)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:9px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow);opacity:0;transition:.2s;z-index:50;pointer-events:none}
.toast.show{opacity:.95}
.savestate{font-size:12.5px;color:var(--muted)}
.pdfmap{display:none}   /* the static map image for the PDF — hidden on screen; shown (when it has a src) only in print */
/* ---- Export to PDF: the browser's Print → Save as PDF, styled to a clean text itinerary + a static map image ---- */
@media print {
  @page { margin: 13mm 12mm; }
  html, body { background:#fff !important; }
  body { -webkit-print-color-adjust:exact; print-color-adjust:exact; }   /* keep the type colour-bars + day tints + weather */
  header.top, .triptabs, .tripmap-hint, .toast, #fltip, #wxtip, #placedetail,
  .modal-ov, #addplaceform, #mapsearchresults, .docdrop, .docpanel { display:none !important; }
  .detail .aside, .mappane { display:none !important; }                  /* the live (interactive) map is screen-only — print uses #pdfmap */
  .pdfmap[src]{ display:block !important; width:100%; max-height:116mm; object-fit:contain; margin:6mm 0 0; border:1px solid #e5e7eb; border-radius:6px; break-inside:avoid; }
  .detail, .detail.hasmap { display:block !important; }   /* also the NO-map shape (?print=1 renders with SHOWMAP off): a fragmented grid prints an extra blank page */
  .detail .main { width:100% !important; max-width:100% !important; }
  /* every edit affordance off */
  .grip, .ctrls, .dctrls, .dayempty, .dayins, .staygeo, .markdot, .ie-form, .ie-toggle, .wxcard { display:none !important; }
  .thead .sub-src { display:none; }                                      /* "Open original in Pages" link + its " · " separator */
  .thead h1 { font-size:21px; }
  .thead, .wxcard { break-after:avoid; }
  .day { background:#fff !important; box-shadow:none !important; border:1px solid #e5e7eb; margin:0 0 7px; break-inside:avoid; }
  .dhead { break-after:avoid; }
  .item, .daystay, .legitem, .flightitem, .legmove, .wxs-row { break-inside:avoid; }
  .item, .daystay { background:#fff !important; box-shadow:none !important; }
  a { color:inherit !important; text-decoration:none !important; }       /* links render as plain text in print */
}
/* ===== Readability tune — itinerary column: an item's type now reads from its emoji icon,
   not a per-item color stripe (that "rainbow" was the busy part). Calmer day badges/headers;
   weekend & PTO date bands kept but at a lower saturation. All theme-var based (works in dark). ===== */
.item .bar, .day .daystay .bar{ display:none; }                  /* drop the per-type color stripes */
.item .tx{ line-height:1.4; }                                    /* a touch more line spacing */
.day .dhead{ background:var(--panel); }                          /* plain weekday header (drop the accent wash) */
.day .daystay{ background:var(--panel); }                        /* plain stay footer */
.day .dhead.mk-green{ background:color-mix(in srgb,var(--panel) 89%,#5aa97c); }                 /* weekend/holiday — kept, softened */
.day .dhead.mk-green.daysel:hover{ background:color-mix(in srgb,var(--panel) 85%,#5aa97c); }
.day .dhead.mk-blue{ background:color-mix(in srgb,var(--panel) 89%,#5a9bd4); }                  /* PTO — kept, softened */
.day .dhead.mk-blue.daysel:hover{ background:color-mix(in srgb,var(--panel) 85%,#5a9bd4); }
.legmove .mvbody{ color:var(--muted); }                          /* drive/transfer pill -> neutral */
.legmove:hover .mvbody{ color:var(--ink); border-color:var(--line); background:var(--panel); }
.legmove .mvline{ border-left-color:var(--muted); opacity:.5; }

/* ===================== MOBILE / TOUCH ===================== */
/* Two independent axes:
   (hover:none)      = touch interaction — hover-revealed controls are unreachable by a finger, so rows get
                       an always-visible ⋯ that opens a bottom ACTION SHEET; drag = long-press (Sortable delay).
   (max-width:880px) = phone layout — the map column becomes a full-screen slide-up sheet toggled by a
                       floating 🗺 button (same DOM node, so the cached map instance & the billed-once
                       map-load invariant are untouched). An iPad gets touch affordances + desktop layout. */
.hdrmore{display:none}
.mctx{display:none;align-items:center;justify-content:center;width:32px;height:28px;margin-left:auto;flex:0 0 auto;border:0;border-radius:8px;background:none;color:var(--muted);font-size:18px;line-height:1;letter-spacing:1px;padding:0}
.mctx:active{background:var(--line);color:var(--ink)}
.day .dhead .dmctx{position:absolute;top:1px;right:1px;width:26px;height:24px;margin:0;font-size:16px}
.mapclose{display:none;align-items:center;justify-content:center;background:var(--panel);color:var(--muted);font-size:16px;line-height:1;width:36px;height:34px;border-radius:9px;border:1px solid var(--line);flex:0 0 auto;padding:0}
.fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:80;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;display:none;align-items:center;justify-content:center;border:none;box-shadow:0 6px 22px rgba(0,0,0,.32);transition:transform .15s;padding:0}
.fab:active{transform:scale(.92)}
/* bottom action sheet (showSheet) */
.sheet-ov{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.42);opacity:0;transition:opacity .2s}
.sheet-ov.on{opacity:1}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:91;background:var(--panel);border-radius:16px 16px 0 0;box-shadow:0 -10px 44px rgba(0,0,0,.4);padding:5px 10px calc(8px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .26s cubic-bezier(.32,.72,0,1);max-height:76vh;overflow:auto;overscroll-behavior:contain}
.sheet.on{transform:none}
.sh-grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:5px auto 7px}
.sh-title{font-size:12.5px;font-weight:700;color:var(--muted);padding:2px 12px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-item{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:12px;border:0;background:none;color:var(--ink);font-size:15.5px;border-radius:10px;box-sizing:border-box;text-decoration:none}   /* button OR <a> (href entries, e.g. Export PDF) — must render identically */
.sh-item:active{background:var(--accent-soft)}
.sh-item .ic{width:24px;text-align:center;font-size:17px;flex:0 0 auto}
.sh-item .lb{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-item.danger{color:#e0533d}
.sh-sep{height:1px;background:var(--line);margin:4px 8px}

@media (hover:none){
  .mctx{display:inline-flex}
  .ctrls{display:none!important}          /* hover ✎/× can't be reached by touch → the ⋯ sheet replaces them */
  .dctrls{display:none!important}         /* day hover controls → the day ⋯ sheet */
  .grip{display:none}                     /* drag = long-press the row itself (wireSortables adds the delay) */
  .covtools{display:none!important}       /* cover tools are hover-only — manage covers on the desktop */
  .item{padding:5px;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .dhead,.daystay{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  [contenteditable="true"]{-webkit-user-select:text;user-select:text}
  .item .tx{font-size:15px;line-height:1.4}
  .item .tm{font-size:12px;min-width:40px;padding-top:2px}
  .item .tm:empty{display:none}           /* narrow screen: don't reserve a time column on untimed rows */
  .item .ic{font-size:15px;padding-top:1px}
  .day .daystay{padding:8px 0 2px 5px;font-size:14px}
  .day .daystay .staygeo{opacity:.6;font-size:15px;padding:2px 6px}
  .daywx{pointer-events:none}             /* the hover tip is mouse-only; the chip stays display-only */
  .dayempty{padding-left:24px}            /* empty-day add; per-row insert (item / transport) lives in the row ⋯ sheet */
  .deadd{opacity:.6}                      /* no hover on touch → keep the empty-day ＋ visible/tappable */
  .dayins{display:none}                   /* insert-day lives in the day ⋯ sheet */
}

@media (max-width:880px){
  /* chrome */
  .top{padding-top:env(safe-area-inset-top)}
  .top .wrap{padding:9px 12px;gap:8px}
  .brand{font-size:16px}
  .brand .bname{display:none}             /* ✈ only — the room goes to the controls */
  #hdrExtra{display:flex;align-items:center;gap:6px;min-width:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  #hdrExtra::-webkit-scrollbar{display:none}
  .search{flex:1 1 120px;min-width:90px;font-size:16px}
  .wrap-main{padding:14px 12px calc(84px + env(safe-area-inset-bottom))}   /* room for the FAB */
  /* library: 2-up cards, filter chips scroll in one row */
  .section-title{margin:20px 2px 10px}
  .grid{grid-template-columns:repeat(2,1fr);gap:11px}
  .card .ttl{font-size:14px}
  .card .when{font-size:12px}
  .card .body{padding:9px 10px 11px}
  .maptools{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
  .maptools::-webkit-scrollbar{display:none}
  .maptools .yr{white-space:nowrap}
  .maptools .lg{white-space:nowrap}
  /* trip header: PDF / cancel / delete / map-toggle fold into the ⋯ sheet; the FAB owns the map */
  .thead h1{font-size:22px}
  .mapbtn,.pdfbtn,.cxbtn,.delbtn{display:none}
  .hdrmore{display:inline-flex}
  /* days & items breathe */
  .day .dgrid{grid-template-columns:60px 1fr}
  .day .dbody{padding:7px 10px 8px 7px}
  .daylist{gap:8px}
  /* editor: ≥16px inputs = no iOS focus-zoom; touch-sized buttons */
  .ie-text,.ie-note,.ie-link,.ie-f,.ie-time,.typesel,.ie-movesel,.mapsearch{font-size:16px}
  .ie-time{width:78px}
  .ie-row{flex-wrap:wrap;row-gap:6px}
  .iconbtn{width:34px;height:32px;font-size:17px}
  .editing-item{padding:8px}
  .modal-card{width:min(92vw,360px)}
  /* map = full-screen slide-up sheet (same .aside node; cached map instance untouched) */
  .detail.hasmap{display:block}
  .detail.hasmap .aside{position:fixed;inset:0;z-index:70;background:var(--bg);margin:0;padding:calc(8px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));transform:translateY(103%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
  body.mapopen .detail.hasmap .aside{transform:none}
  .detail.hasmap .mappane{height:100%;display:flex;flex-direction:column;min-height:0}
  .maphead{flex-wrap:nowrap;margin-bottom:8px}
  .mapclose{display:inline-flex}
  .mapdaylbl{display:none}                /* tight header: search + Show-all + ✕ */
  .mapsearch{max-width:none}
  .mappane .maparea{flex:1;min-height:0;display:flex;flex-direction:column}
  .mappane .tripmap{flex:1;height:auto;min-height:0;max-height:none;margin:0}
  .maplegend{margin-top:6px;font-size:11px;gap:9px}
  .placedetail{left:8px;right:8px;width:auto;top:auto;bottom:8px;height:auto;max-height:62%;min-height:0}
  body.mapopen{overflow:hidden}
  .fab.show{display:flex}
  body:has(.editing-item) .fab{display:none}   /* don't cover the editor's bottom fields while typing */
  .toast{z-index:110;bottom:calc(84px + env(safe-area-inset-bottom));max-width:92vw}
}
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <div class="brand" onclick="location.hash='#/'"><span class="dot">✈</span><span class="bname">Travel Planner</span></div>
    <div class="spacer"></div>
    <span id="hdrExtra"></span>
  </div>
</header>
<main class="wrap-main" id="app"></main>
<div class="toast" id="toast"></div>
<button id="mapfab" class="fab" onclick="toggleMapSheet()" aria-label="Toggle map">🗺</button>

<script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const TYPES = {
  flight:{ic:"✈️",c:"var(--flight)",label:"Flight"},
  train:{ic:"🚆",c:"var(--train)",label:"Train"},
  transfer:{ic:"🚗",c:"var(--transfer)",label:"Transfer"},
  cruise:{ic:"🛳️",c:"var(--cruise)",label:"Cruise"},
  hotel:{ic:"🛏️",c:"var(--hotel)",label:"Hotel"},
  activity:{ic:"⭐️",c:"var(--activity)",label:"Activity"},
  ski:{ic:"🎿",c:"var(--ski)",label:"Ski"},
  hiking:{ic:"🥾",c:"var(--hiking)",label:"Hiking"},
  dive:{ic:"🤿",c:"var(--dive)",label:"Dive"},
  museum:{ic:"🏛️",c:"var(--museum)",label:"Museum"},
  meal:{ic:"🍽",c:"var(--meal)",label:"Meal"},
  bar:{ic:"🍸",c:"var(--bar)",label:"Bar"},
  work:{ic:"💼",c:"var(--work)",label:"Work"},
  rest:{ic:"🛋️",c:"var(--rest)",label:"Rest"},
  note:{ic:"📝",c:"var(--note)",label:"Note"},
};
const DOC_ICON={"E-tickets":"🎫",Hotels:"🏨",Visa:"🛂",Maps:"🗺",Invoices:"🧾",Insurance:"🛡",Itinerary:"📋",Packing:"🧳",Info:"ℹ️",Media:"🎬",Other:"📄"};
const $=(s,r=document)=>r.querySelector(s);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayISO=()=>new Date().toISOString().slice(0,10);
const uid=p=>p+Math.random().toString(36).slice(2,8);
let toastT;
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1600);}

/* ---------- api ---------- */
const api={
  trips:()=>fetch("/api/trips").then(r=>r.json()),
  trip:id=>fetch("/api/trip?id="+encodeURIComponent(id)).then(r=>r.json()),
  save:t=>fetch("/api/trip",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(t)}).then(r=>r.json()),
  create:(title,startDate)=>fetch("/api/trip/new",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title,startDate})}).then(r=>r.json()),
  del:id=>fetch("/api/trip/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})}).then(r=>r.json()),
  open:path=>fetch("/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path})}).then(r=>r.json()),
  documents:id=>fetch("/api/documents?id="+encodeURIComponent(id)).then(r=>r.json()),
};

/* ---------- map engine (Google when a key is set, else Leaflet fallback) ---------- */
let GKEY=undefined, PDFOK=false, _gp=null;   // PDFOK = server can render a PDF (headless Chrome on the Mac) → touch clients export via GET /api/pdf
async function getKey(){
  if(GKEY===undefined){try{const c=(await fetch("/api/config").then(r=>r.json()))||{};GKEY=c.googleMapsApiKey||"";PDFOK=!!c.pdfEngine;}catch(e){GKEY="";}}
  return GKEY;
}
function ensureGoogle(){
  if(_gp)return _gp;
  _gp=new Promise((resolve,reject)=>{
    getKey().then(k=>{
      if(!k)return reject("nokey");
      if(window.google&&window.google.maps)return resolve();
      window.__gmcb=()=>resolve();
      const s=document.createElement("script");
      s.async=true;s.onerror=()=>reject("loaderr");
      s.src="https://maps.googleapis.com/maps/api/js?key="+encodeURIComponent(k)+"&libraries=marker,places&loading=async&callback=__gmcb";
      document.head.appendChild(s);
    });
  });
  return _gp;
}
// API keys (Google Maps / AeroDataBox) are configured in config.local.json on the
// backend — there is intentionally no in-UI key setter.
const PLACE_STYLE={        // per-place-TYPE pin colour (light / low-saturation); glyph pulled from TYPES so map pins stay identical to the itinerary's left icons
  stay:{color:"#7aa8c6",glyph:TYPES.hotel.ic},
  activity:{color:"#7dc091",glyph:TYPES.activity.ic},
  ski:{color:"#8fc7e6",glyph:TYPES.ski.ic},
  hiking:{color:"#b3bf7e",glyph:TYPES.hiking.ic},
  dive:{color:"#80bcd8",glyph:TYPES.dive.ic},
  museum:{color:"#c19ec8",glyph:TYPES.museum.ic},
  meal:{color:"#e9b47c",glyph:TYPES.meal.ic},
  bar:{color:"#e0a9c5",glyph:TYPES.bar.ic},
  cruise:{color:"#79bdc6",glyph:TYPES.cruise.ic},
  work:{color:"#95a1b2",glyph:TYPES.work.ic},
  rest:{color:"#a6be89",glyph:TYPES.rest.ic},
  airport:{color:"#8fb3e6",glyph:TYPES.flight.ic},
  station:{color:"#c98d99",glyph:TYPES.train.ic},   // derived-only (like airport): a train's located start/end station
  other:{color:"#ada69d",glyph:"📍"}
};
function placeStyle(t){return PLACE_STYLE[t]||PLACE_STYLE.other;}
function smapColor(type){   // a vivid, print-legible marker colour per place type for the Static Maps PDF image
  return ({stay:"0x6b5bd6",activity:"0x1f9d57",meal:"0xd98316",bar:"0xc85d8e",museum:"0x9a5fa0",ski:"0x38a8d8",hiking:"0x7a8c39",dive:"0x0e7aa6",cruise:"0x119bb0",work:"0x5f6b80",rest:"0x7a9b4e",airport:"0x2f6df0"})[type]||"0xc0455e";
}
function smapPathColor(mode){   // route-line colour per transport mode (loosely tracks MODE_STYLE)
  return ({flight:"0x2f6df0",car:"0x0f9b8e",walk:"0xd98316",transit:"0x9a5fa0",train:"0xc0455e",ferry:"0x119bb0"})[mode]||"0x5f6b80";
}
function staticMapURL(t){   // a printable map IMAGE for the PDF — Google Static Maps: markers by place type + route lines (the SAME transport legs the on-screen map draws). null ⇒ no key / no places (PDF just omits the map)
  if(!GKEY)return null;
  let ps=(t.places||[]).filter(p=>p&&p.lat!=null&&p.lng!=null);
  const dest=ps.filter(p=>!isAirportPlace(p));
  if(dest.length)ps=dest;   // don't frame airports — a far departure airport (e.g. JFK on an Iceland trip) shouldn't zoom the PDF map out; auto-fit frames the destinations
  if(!ps.length)return null;
  const ll=p=>(+p.lat).toFixed(5)+","+(+p.lng).toFixed(5);
  const groups={};
  ps.forEach(p=>{const c=smapColor(p.type);(groups[c]=groups[c]||[]).push(ll(p));});
  const parts=Object.entries(groups).map(([c,pts])=>"markers="+encodeURIComponent("size:small|color:"+c+"|"+pts.join("|")));
  try{                                                          // route lines: reuse buildRoute → only real transport legs, coloured by mode (matches the screen map)
    buildRoute(t,linkPlaces(t)).forEach(s=>{
      const a=t.places[s.from],b=t.places[s.to];
      if(a&&b&&a.lat!=null&&b.lat!=null)parts.push("path="+encodeURIComponent("geodesic:true|weight:3|color:"+smapPathColor(s.mode)+"|"+ll(a)+"|"+ll(b)));
    });
  }catch(e){}
  return "https://maps.googleapis.com/maps/api/staticmap?size=640x400&scale=2&maptype=roadmap&"+parts.join("&")+"&key="+encodeURIComponent(GKEY);
}
function gPin(color,big){   // small SVG balloon pin (Google), filled by place type + a soft drop shadow; the glyph rides on top as the marker label. big=true → a slightly larger "pop" for hover: icon + label scale TOGETHER (the label tracks labelOrigin), so the glyph stays centred — unlike the old BOUNCE which moved only the balloon.
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">`
    +`<defs><filter id="d" x="-40%" y="-25%" width="180%" height="170%"><feDropShadow dx="0" dy="1.1" stdDeviation="1.3" flood-color="#0b1220" flood-opacity="0.5"/></filter></defs>`
    +`<path filter="url(#d)" d="M14 2.5C8 2.5 3.5 7 3.5 13c0 6 5.5 13 10.5 22.5C19 26 24.5 19 24.5 13 24.5 7 20 2.5 14 2.5z" fill="${color}" stroke="#fff" stroke-width="2.2"/>`
    +`</svg>`;
  const s=big?1.7:1.3;   // bigger balloons so the trip's pins clearly outsize Google's own POI icons (base 1.3×; hover ~1.7× keeps the same +30% "pop")
  return {url:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg),
    scaledSize:new google.maps.Size(23*s,31*s),anchor:new google.maps.Point(11.5*s,28.6*s),labelOrigin:new google.maps.Point(11.5*s,10.6*s)};
}
function gMapOpts(extra){
  const dark=matchMedia("(prefers-color-scheme:dark)").matches;
  return Object.assign({mapTypeControl:true,streetViewControl:true,fullscreenControl:true,
    gestureHandling:"greedy",isFractionalZoomEnabled:true,clickableIcons:false,   // clickableIcons:false → Google's own POIs never intercept a map click (click-to-add stays reliable)
    styles:(dark?GMAP_DARK:[]).concat(GMAP_DECLUTTER)},extra||{});   // fractional zoom → smooth rAF zoom-in on a raster map; DECLUTTER always applied so OUR pins are the only markers
}
const GMAP_DARK=[
  {elementType:"geometry",stylers:[{color:"#1d2530"}]},
  {elementType:"labels.text.fill",stylers:[{color:"#9aa3b2"}]},
  {elementType:"labels.text.stroke",stylers:[{color:"#1d2530"}]},
  {featureType:"water",elementType:"geometry",stylers:[{color:"#0e1116"}]},
  {featureType:"road",elementType:"geometry",stylers:[{color:"#2a3340"}]},
  {featureType:"poi",elementType:"geometry",stylers:[{color:"#222a36"}]},
  {featureType:"poi.park",elementType:"geometry",stylers:[{color:"#1f3326"}]},
  {featureType:"administrative",elementType:"geometry",stylers:[{color:"#3a4453"}]},
];
// Light declutter: KEEP Google's place POIs (restaurants / sights / shops) so you can still spot places
// nearby — only drop the transit station icons, which are pure noise (not somewhere you'd add to a trip).
// The trip's own pins are drawn bigger (see gPin) so they read as yours despite Google's POIs around them.
const GMAP_DECLUTTER=[
  {featureType:"transit",elementType:"labels.icon",stylers:[{visibility:"off"}]},
];

/* ---------- date helpers ---------- */
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WK=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function parseISO(s){if(!s||!/^\d{4}-\d{2}-\d{2}/.test(s))return null;const[y,m,d]=s.slice(0,10).split("-").map(Number);return new Date(y,m-1,d);}
function weekday(s){const d=parseISO(s);return d?WK[d.getDay()]:"";}
function isPlaceholder(t){return t.startDate&&t.endDate&&t.startDate.endsWith("-01")&&t.startDate===t.endDate;}
function fmtRange(t){
  const a=parseISO(t.startDate),b=parseISO(t.endDate);
  if(!a)return t.startDate||"";
  if(isPlaceholder(t)||!b||+a===+b)return MON[a.getMonth()]+" "+a.getFullYear();
  const sameY=a.getFullYear()===b.getFullYear();
  const sameM=sameY&&a.getMonth()===b.getMonth();
  if(sameM)return `${MON[a.getMonth()]} ${a.getDate()}–${b.getDate()}, ${a.getFullYear()}`;
  if(sameY)return `${MON[a.getMonth()]} ${a.getDate()} – ${MON[b.getMonth()]} ${b.getDate()}, ${a.getFullYear()}`;
  return `${MON[a.getMonth()]} ${a.getDate()}, ${a.getFullYear()} – ${MON[b.getMonth()]} ${b.getDate()}, ${b.getFullYear()}`;
}

// Paste as PLAIN text into our contenteditable fields (hotel-stay / day-date / title) — otherwise the browser
// keeps the copied source's rich formatting (font/size/colour). Inputs & textareas already paste plain, so skip.
document.addEventListener("paste",e=>{
  const el=e.target;
  if(!el||!el.isContentEditable)return;
  e.preventDefault();
  const text=((e.clipboardData||window.clipboardData).getData("text/plain")||"").replace(/\r\n?/g,"\n");
  document.execCommand("insertText",false,text);   // inserts at the caret, replaces any selection, stays natively undoable
});

});

async function renderLibrary(){
  const app=$("#app");app.innerHTML=`<div class="empty">Loading…</div>`;
  ALLTRIPS=(await api.trips()).filter(t=>!t.archive);
  $("#hdrExtra").innerHTML=
    `<input id="libsearch" class="search" placeholder="Search trips…" value="${esc(LIBQ)}" oninput="LIBQ=this.value;drawLibrary()">`+
    ` <button class="btn primary sm" onclick="newTrip()">＋ New trip</button>`+

  drawLibrary();
  const s=$("#libsearch");if(s&&LIBQ){s.focus();s.setSelectionRange(LIBQ.length,LIBQ.length);}

}
function statusOf(t){
  if(t.status==="cancelled")return "cancelled";
  return (t.endDate||t.startDate||"")>=todayISO()?"upcoming":"past";
}
function daysUntilStart(t){   // whole calendar days until the trip starts; null if no start / already started / cancelled
  if(!t||t.status==="cancelled"||!t.startDate)return null;
  const a=Date.parse(t.startDate+"T00:00:00Z"),b=Date.parse(todayISO()+"T00:00:00Z");
  if(isNaN(a)||isNaN(b))return null;
  const d=Math.round((a-b)/86400000);
  return d>=0?d:null;
}
function soonLabel(d){return d===0?"today":d===1?"tomorrow":"in "+d+" days";}
function setLibYear(y){LIBYEAR=y;drawLibrary();}
function setLibStatus(s){LIBSTATUS=s;drawLibrary();}
function drawLibrary(){
  const q=LIBQ.trim().toLowerCase();
  const years=[...new Set(ALLTRIPS.map(t=>(t.startDate||"").slice(0,4)).filter(Boolean))].sort().reverse();
  const trips=ALLTRIPS.filter(t=>{
    if(q&&!((t.title||"").toLowerCase().includes(q)||(t.startDate||"").includes(q)))return false;
    if(LIBYEAR!=="all"&&(t.startDate||"").slice(0,4)!==LIBYEAR)return false;
    if(LIBSTATUS!=="all"&&statusOf(t)!==LIBSTATUS)return false;
    return true;
  });
  // filter bar: year chips + status chips
  const yChips=["all",...years].map(y=>`<button class="yr ${LIBYEAR===y?'on':''}" onclick="setLibYear('${y}')">${y==="all"?"All years":y}</button>`).join("");
  const sChips=[["all","All"],["upcoming","Upcoming"],["past","Past"],["cancelled","Cancelled"]]
    .map(([k,l])=>`<button class="yr ${LIBSTATUS===k?'on':''}" onclick="setLibStatus('${k}')">${l}</button>`).join("");
  const bar=`<div class="maptools">${yChips}<span class="vsep"></span>${sChips}`+
    `<span class="lg" style="margin-left:auto">${trips.length} / ${ALLTRIPS.length} trips</span></div>`;
  // group by year, both years and within-year by date descending (newest first)
  const groups={};
  trips.forEach(t=>{const y=(t.startDate||"").slice(0,4)||"?";(groups[y]=groups[y]||[]).push(t);});
  const gy=Object.keys(groups).sort().reverse();
  gy.forEach(y=>groups[y].sort((a,b)=>(b.startDate||"").localeCompare(a.startDate||"")));
  const body=gy.length
    ? gy.map(y=>`<div class="section-title">${y} · ${groups[y].length} trips</div><div class="grid">${groups[y].map(card).join("")}</div>`).join("")
    : `<div class="empty">No matching trips</div>`;
  $("#app").innerHTML=bar+body;
}
function card(t){
  const ver=t.coverVer||0;
  const cov=t.cover?`<img loading="lazy" src="/data/${esc(t.cover)}?v=${ver}" onerror="this.style.display='none'">`:"";
  const ph=t.cover?"":`<div class="ph">${esc((t.title||"?")[0])}</div>`;
  const cancel=t.status==="cancelled"?`<span class="badge cancel">Cancelled</span>`:"";
  const raw=(!t.structured&&t.status!=="cancelled")?`<span class="badge raw" title="Not yet structured — view original">Raw</span>`:"";
  const du=daysUntilStart(t),soon=du!=null?`<span class="badge soon" title="Starts ${esc(fmtRange(t))}">${soonLabel(du)}</span>`:"";   // countdown for an upcoming trip
  const ord=t.startDate?esc((t.startDate.slice(0,7)).replace("-",".")): "";
  const back=t.canCoverBack?`<button class="covbtn" title="Back to previous photo" onclick="navCover('${esc(t.id)}',-1,this)">↩</button>`:"";
  const fwd=t.canCoverFwd?`<button class="covbtn" title="Forward to next photo" onclick="navCover('${esc(t.id)}',1,this)">↪</button>`:"";
  return `<div class="card ${t.status==='cancelled'?'cancelled':''}" onclick="location.hash='#/trip/${encodeURIComponent(t.id)}'">
    <div class="cover">${cov}${ph}<div class="cnr">${ord?`<span class="ord">${ord}</span>`:""}${cancel}${soon}</div>
      <div class="covtools" onclick="event.stopPropagation()">
        ${back}${fwd}
        <button class="covbtn" title="Upload cover image" onclick="uploadCover('${esc(t.id)}')">📷</button>
        <button class="covbtn" title="Change destination photo" onclick="autoCover('${esc(t.id)}',this)">🏞</button>
      </div>
    </div>
    <div class="body"><div class="ttl">${esc(t.title)} ${raw}</div>
    <div class="when">${esc(fmtRange(t))}${t.dayCount?` · ${t.dayCount} days`:""}</div></div></div>`;
}
let _coverInput=null;
function uploadCover(id){
  if(!_coverInput){_coverInput=document.createElement("input");_coverInput.type="file";_coverInput.accept="image/*";_coverInput.style.display="none";document.body.appendChild(_coverInput);}
  _coverInput.value="";
  _coverInput.onchange=async()=>{
    const f=_coverInput.files[0];if(!f)return;
    toast("Uploading…");
    try{
      const buf=await f.arrayBuffer();
      const r=await fetch("/api/cover?id="+encodeURIComponent(id),{method:"POST",headers:{"Content-Type":f.type||"application/octet-stream"},body:buf}).then(x=>x.json());
      if(r&&r.ok)bumpCover(id,r.coverVer,"Cover updated",r);else toast("Upload failed: "+((r&&r.error)||""));
    }catch(e){toast("Upload failed");}
  };
  _coverInput.click();
}
async function autoCover(id,btn){
  const old=btn?btn.textContent:"";if(btn)btn.textContent="…";
  toast("Finding a new photo…");
  try{
    const r=await fetch("/api/cover/auto",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})}).then(x=>x.json());
    if(r&&r.ok)bumpCover(id,r.coverVer,"Changed to "+(r.landmark||"a new photo"),r);
    else toast("No new photo found — try again or upload one");
  }catch(e){toast("Fetch failed");}
  if(btn)btn.textContent=old||"🏞";
}
async function navCover(id,dir,btn){
  const old=btn?btn.textContent:"";if(btn)btn.textContent="…";
  toast(dir<0?"Going back…":"Going forward…");
  try{
    const r=await fetch("/api/cover/nav",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,dir})}).then(x=>x.json());
    if(r&&r.ok)bumpCover(id,r.coverVer,(dir<0?"← ":"→ ")+(r.landmark||"photo"),r);
    else toast((r&&r.error)||"Nothing more that way");
  }catch(e){toast("Failed");}
  if(btn)btn.textContent=old||(dir<0?"↩":"↪");
}
function bumpCover(id,ver,msg,nav){
  const t=ALLTRIPS.find(x=>x.id===id);
  if(t){t.cover="covers/"+id+".jpg";t.coverVer=ver||((t.coverVer||0)+1);
        if(nav){t.canCoverBack=!!nav.canBack;t.canCoverFwd=!!nav.canFwd;}}
  drawLibrary();toast(msg||"Updated");
}

function closeNewTrip(){const h=document.getElementById("newtripmodal");if(h)h.remove();}
async function createTripFromModal(){
  const tEl=document.getElementById("nt-title");if(!tEl)return;
  const title=(tEl.value||"").trim();
  if(!title){toast("Name the trip first");tEl.focus();return;}
  const start=(document.getElementById("nt-date").value||"").trim();
  let days=parseInt(document.getElementById("nt-days").value,10);if(!(days>=1))days=1;if(days>60)days=60;
  closeNewTrip();
  const t=await api.create(title,start);
  if(!t||!t.id){toast("Create failed");return;}
  t.days=t.days||[];
  if(start&&t.days[0])t.days[0].label="";        // show the start date on day 1 (skeleton seeds label "Day 1")
  let last=t.days[t.days.length-1];
  for(let i=t.days.length;i<days;i++){            // pre-fill the requested number of days, auto-dated from the start
    let date="";
    if(last&&parseISO(last.date)){const n=parseISO(last.date);n.setDate(n.getDate()+1);date=n.toISOString().slice(0,10);}
    const nd={id:uid("d"),date,label:"",stay:"",items:[]};t.days.push(nd);last=nd;
  }
  try{await api.save(t);}catch(e){}
  location.hash="#/trip/"+encodeURIComponent(t.id);
}

let CUR=null, saveT=null, EDITITEM=null, EDITLEGS=null;   // EDITITEM=open editor key; EDITLEGS=working stops
let UNDO=[], REDO=[], _preEdit=null;       // snapshot-based undo/redo (whole-trip), _preEdit = pre-field-edit snap
let ADDPLACE=false, PENDXP=null;           // ADDPLACE=armed: next trip-map click drops a place; PENDXP={lat,lng,label} awaiting confirm
let MAPSEARCH=[];                           // last in-map search results, indexed by pickSearchResult
let _searchSeq=0,_searchDeb=null;           // search-as-you-type: a sequence guard (drop stale async results) + the debounce timer
let LOCITEM=null;                           // when set ({dayId,itemId}), the next search pick BINDS that location to the item (for an item whose own text doesn't geocode, e.g. "Cruise Day 7 Disembark")
let LOCSTAY=null;                           // when set (dayId), the next search pick BINDS that location to the day's 🛏 stay (a hotel that the Nominatim path missed but Google Places finds)
let LOCEND=null;                            // when set ({dayId,itemId,endIndex}), the next search pick BINDS that location to a train/transfer endpoint (it.ends[endIndex].geo)
let LASTDAY=null;                           // the day ordinal of the last place added — the add-to-itinerary menus default to it (so adding several places to one day doesn't re-pick the day each time)
let TRIPTAB='trip';                         // trip-detail sub-tab: 'trip' (itinerary + map) | 'docs' (Documents)
async function renderTrip(id,startEdit){   // startEdit kept for #/trip/<id>/edit route compat; ignored (always editable)
  const app=$("#app");app.innerHTML=`<div class="empty">Loading…</div>`;
  CUR=await api.trip(id);
  if(CUR.error){app.innerHTML=`<div class="empty">Trip not found. <a href="#/">Back</a></div>`;return;}
  hydrateTrip(CUR);            // day.stay: wrap legacy string → shared item object (multi-night = one object). Idempotent.
  backfillItemGeo(CUR);        // give every item a stored geo object + stamp the stable item↔place link (one-time, idempotent)
  backfillPlaceItemIds(CUR);   // merge item-places at the same day+coord → one place with itemIds[] (one pin, all its items). Idempotent.
  backfillTransferEnds(CUR);   // give legacy mode-transfers structured endpoints (ref+text) so they resolve by id (one-time, idempotent)
  if(backfillTrainEnds(CUR))scheduleSave();   // seed each train's ends[] + heal parse-dirtied station text / duplicated times; persist a heal
  if(ensureFlightAirports(CUR)){tripMapCache.delete(CUR.id);scheduleSave();}   // add a ✈ pin for every flight's airports (once; rebuild the map if its cache predates them)
  if(ensureTrainStations(CUR)){tripMapCache.delete(CUR.id);scheduleSave();}    // derive a 🚆 pin for every train's located stations (from ends[].geo); rebuild if stale
  syncDateLabels();            // heal any "M/D" labels that drifted from their date (e.g. inserts made before this fix)
  SELDAY=null;                 // a freshly opened trip starts showing all days
  EDITITEM=null;EDITLEGS=null;UNDO=[];REDO=[];_preEdit=null;
  ADDPLACE=false;PENDXP=null;MAPSEARCH=[];LOCITEM=null;LOCSTAY=null;LOCEND=null;LASTDAY=null;TRIPTAB='trip';   // a freshly opened trip starts on the Itinerary tab
  _lastMapId=null;   // a (re)opened trip frames its map (edits within it keep the view via _tripView)
  if(PRINTMODE)SHOWMAP=false;   // headless PDF render: skip the live (billed) map build — the PDF uses the static image
  drawTrip();
  if(PRINTMODE)preparePrint();  // fill #pdfmap + inject the pageless @page; Chrome's --print-to-pdf does the printing
}

function setPagelessSize(){        // "pageless": size the @page height to the whole itinerary so the PDF is ONE continuous page — no page breaks, so a day never splits across pages and the weather card isn't stranded on its own page
  try{
    const detail=document.querySelector(".detail.live");if(!detail)return;
    detail.classList.add("pdfmeasure");                                   // reflow at print width, map column hidden (synchronous; removed before any repaint)
    const main=detail.querySelector(".main"), contentPx=main?main.scrollHeight:0;
    detail.classList.remove("pdfmeasure");
    if(!contentPx)return;
    const img=document.getElementById("pdfmap"), mapMm=(img&&img.getAttribute("src"))?126:0;   // the static map (~116mm) + its gap/border
    // The print re-layout runs a hair TALLER than this screen measure (print-only day borders, fractional
    // line rounding) — measured ~1.4mm over on a 583mm trip. Undershooting by even 1mm breaks the single
    // page (break-inside:avoid bounces the whole map/day onto page 2); overshoot is just invisible tail
    // whitespace on a pageless PDF. So cushion asymmetrically: +1.5% +4mm.
    // Cushion the height GENEROUSLY (+8% +10mm): Chrome's fragmentation engine refuses to fill a page
    // right up to its content box — measured on a real trip, content needing 597mm still bounced its
    // break-inside:avoid map onto page 2 at 620mm and only settled at ~660mm. Undershoot = a broken
    // extra page; overshoot = invisible tail whitespace on a pageless PDF. Err high.
    const h=Math.max(120,Math.min(4800,Math.ceil((contentPx*25.4/96 + mapMm + 6)*1.08 + 10 + 26)));   // + page margins (13mm×2); cap for the print engine
    let st=document.getElementById("pageless-style");
    if(!st){st=document.createElement("style");st.id="pageless-style";document.head.appendChild(st);}
    st.textContent=`@media print{@page{size:210mm ${h}mm;margin:13mm 12mm} html,body{height:auto!important}}`;
  }catch(_){}
}
async function preparePrint(){     // ?print=1 boot (headless Chrome behind GET /api/pdf): exportPDF's prep minus window.print()
  document.title=(CUR&&CUR.title)||document.title;           // → the PDF's metadata title
  await getKey();                                            // staticMapURL needs GKEY; with the live map skipped nothing else fetched it
  const img=document.getElementById("pdfmap"), url=CUR&&staticMapURL(CUR);
  if(img&&url){img.onload=()=>setPagelessSize();img.onerror=()=>{img.removeAttribute("src");setPagelessSize();};img.src=url;}
  else{if(img)img.removeAttribute("src");setPagelessSize();}
  setTimeout(setPagelessSize,8000);                          // safety net (virtual time makes this cheap): a hung map image still gets the pageless @page
}
function exportPDF(){              // Print → Save as PDF, via the @media print stylesheet (clean text itinerary + a static map image)
  if(TRIPTAB==="docs")return;
  if(IS_TOUCH&&PDFOK&&CUR){window.open("/api/pdf?id="+encodeURIComponent(CUR.id));return;}   // touch: the Mac renders the PDF (GET /api/pdf) — window.print() is a no-op in an iOS standalone PWA. window.open stays synchronous in the tap (async would be popup-blocked); the ⋯ sheet's entry is a real <a> for the same reason.
  if(EDITITEM){EDITITEM=null;EDITLEGS=null;drawTrip();}      // close any open editor so it isn't printed mid-edit
  const prev=document.title; document.title=(CUR&&CUR.title)||prev;       // the browser uses the title as the default PDF filename
  const restore=()=>{document.title=prev;window.removeEventListener("afterprint",restore);};
  window.addEventListener("afterprint",restore);
  let fired=false; const go=()=>{if(fired)return;fired=true;setPagelessSize();setTimeout(()=>window.print(),60);};
  const img=document.getElementById("pdfmap"), url=staticMapURL(CUR);     // a printable static map; null ⇒ no key/places ⇒ PDF omits the map
  if(img&&url){
    img.onload=go;
    img.onerror=()=>{img.removeAttribute("src");go();};                   // Static Maps API not enabled / failed → just print without the map
    img.src=url;
    setTimeout(()=>{if(img&&!img.complete)img.removeAttribute("src");go();},5000);   // safety: never hang on a slow/blocked image
  }else{ if(img)img.removeAttribute("src"); go(); }
}
function toggleCancel(){

  CUR.status=CUR.status==="cancelled"?"active":"cancelled";

  drawTrip();                                                  // refresh the header button + the "Cancelled" badge
  toast(CUR.status==="cancelled"?"Trip marked cancelled":"Trip reactivated");
}
